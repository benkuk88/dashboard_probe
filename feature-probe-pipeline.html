function formatLoadedAt(d) {
  return d.toLocaleString(undefined, {
    year: "numeric", month: "short", day: "2-digit",
    hour: "2-digit", minute: "2-digit",
  });
}

// ============================================================================
// PREDICTOR — what-if calculator per feature & per pipeline stage.
// ============================================================================

// Each stage is one progress step in the pipeline. `done` and `target` come
// straight from the aggregated CSV row; `unit` is what we're counting (patients
// vs frames) and is shown in labels.
function stagesForFeature(f) {
  return [
    {
      id: "collection",
      label: "Phase 1 — Collection",
      unit: "patients",
      done: f.collected,
      target: f.required,
    },
    {
      id: "curation",
      label: "Phase 2 — Curation",
      unit: "patients",
      done: f.passCuration + f.failCuration,
      target: f.collected,
    },
    {
      id: "annotation",
      label: "Phase 3 — Annotation",
      unit: "frames",
      done: f.completeAnnotations,
      target: f.completeAnnotations + f.pendingAnnotations,
    },
    {
      id: "review",
      label: "Phase 4 — Frame review",
      unit: "frames",
      done: f.framesPassReview + f.framesFailReview,
      target: f.framesPassReview + f.framesFailReview + f.pendingReview,
    },
  ];
}

// Curation, annotation, and frame review are human-bound — total throughput
// scales linearly with the size of the team working on that stage. Collection
// is gated by patient flow rather than headcount, so it stays workers-agnostic.
const HUMAN_BOUND_STAGES = new Set(["curation", "annotation", "review"]);
function stageIsHumanBound(stageId) { return HUMAN_BOUND_STAGES.has(stageId); }

// ============================================================================
// WHOLE-PIPELINE FUNNEL & SIMULATOR
// ============================================================================
// In whole-pipeline mode we treat every phase as patient-counted for now (frame
// math will come later). Phase 1 starts from `required`. Curation pass-rate
// narrows the funnel into annotation/review; we assume 100% pass for the other
// hand-offs until we have CSV columns for them.

const PIPELINE_PHASES = [
  { id: "collection", label: "Phase 1 — Collection",  unit: "patients", tone: "info"    },
  { id: "curation",   label: "Phase 2 — Curation",    unit: "patients", tone: "success" },
  { id: "annotation", label: "Phase 3 — Annotation",  unit: "patients", tone: "warning" },
  { id: "review",     label: "Phase 4 — Final review", unit: "patients", tone: "violet" },
];

// Build the per-phase done/target funnel for the whole-pipeline simulator.
// Returns { phases: [{id, label, unit, tone, done, target, passRateForward}],
//           passRates: {curationToAnnotation, annotationToReview, ...},
//           hasCurationHistory: bool }
function buildPipelineFunnel(featureAgg) {
  const required = featureAgg.required || 0;
  const collected = featureAgg.collected || 0;
  const passCur = featureAgg.passCuration || 0;
  const failCur = featureAgg.failCuration || 0;
  const totalCurated = passCur + failCur;
  const hasCurationHistory = totalCurated > 0;
  // Observed curation pass rate, with a safe fallback to 100% when no curation
  // has happened yet so the simulator stays actionable.
  const curPassRate = hasCurationHistory ? passCur / totalCurated : 1.0;
  // Annotation pass-rate isn't in the CSV yet — assume 100%.
  const annoPassRate = 1.0;

  // Funnel-narrowed targets, in patients.
  const phase1Target = required;
  const phase2Target = required;                     // intake from collection
  const phase3Target = Math.round(required * curPassRate);
  const phase4Target = Math.round(phase3Target * annoPassRate);

  // Existing progress (clamp so it can't exceed the target — happens when the
  // CSV reports more done than required, or when the funnel narrows).
  const phase1Done = Math.min(collected,                              phase1Target);
  const phase2Done = Math.min(passCur + failCur,                      phase2Target);
  const phase3Done = Math.min(featureAgg.completeAnnotations || 0,    phase3Target);
  const phase4Done = Math.min(
    (featureAgg.framesPassReview || 0) + (featureAgg.framesFailReview || 0),
    phase4Target,
  );

  return {
    phases: [
      { id: "collection", label: PIPELINE_PHASES[0].label, unit: "patients", tone: "info",
        done: phase1Done, target: phase1Target, passRateForward: 1.0 },
      { id: "curation", label: PIPELINE_PHASES[1].label, unit: "patients", tone: "success",
        done: phase2Done, target: phase2Target, passRateForward: curPassRate },
      { id: "annotation", label: PIPELINE_PHASES[2].label, unit: "patients", tone: "warning",
        done: phase3Done, target: phase3Target, passRateForward: annoPassRate },
      { id: "review", label: PIPELINE_PHASES[3].label, unit: "patients", tone: "violet",
        done: phase4Done, target: phase4Target, passRateForward: 1.0 },
    ],
    passRates: { curation: curPassRate, annotation: annoPassRate },
    hasCurationHistory,
  };
}

const SIMULATION_DAY_CAP = 1825; // 5 years; matches the plan's runaway guard.

// Stream patients through all four phases day-by-day. Returns per-phase
// start/end dates and a daily cumulative series for charting.
//
// params: {
//   startDate: Date,                  earliest day any phase can start
//   workdays: number (1..7),          working days per calendar week
//   phases:   [{ id, ratePerDay, workers, startOverride? }]
// }
// funnel: result of buildPipelineFunnel — provides done/target/passRateForward.
function simulatePipeline(funnel, params) {
  const { startDate, workdays } = params;
  const cfgById = new Map(params.phases.map((p) => [p.id, p]));

  // Per-phase mutable state. `available` is the patient backlog upstream has
  // delivered to this phase but which haven't been consumed yet. Collection
  // pulls from an infinite pool (the patients we still need to acquire).
  const phaseState = funnel.phases.map((p) => {
    const cfg = cfgById.get(p.id) || { ratePerDay: 0, workers: 1 };
    const effectiveRate = (Number(cfg.ratePerDay) || 0) * (stageIsHumanBound(p.id)
      ? Math.max(1, Number(cfg.workers) || 1)
      : 1);
    return {
      id: p.id,
      label: p.label,
      unit: p.unit,
      tone: p.tone,
      done: p.done,
      target: p.target,
      remainingInitial: Math.max(0, p.target - p.done),
      passRateForward: p.passRateForward,
      effectiveRate,                              // patients per working day
      workers: stageIsHumanBound(p.id) ? Math.max(1, Number(cfg.workers) || 1) : 1,
      ratePerDay: Number(cfg.ratePerDay) || 0,    // pre-workers, for display
      startOverride: cfg.startOverride || null,
      startOverrideClamped: false,
      // Backlog the phase can work on. Collection has unlimited supply (we
      // model it as the gap to its own target). Downstream phases accumulate
      // as upstream phases produce.
      available: p.id === "collection" ? Math.max(0, p.target - p.done) : 0,
      start: null,
      end: null,
      series: [],                                  // [{ date, addedToday, cumulative }]
    };
  });

  // Seed the downstream backlog for what's already been completed upstream
  // beyond what this phase has consumed. e.g. if 30 collected but only 20
  // curated, curation already has 10 patients waiting on day 0.
  // (Phase 2 backlog = phase1.done * passRateForward(=1) - phase2.done.)
  for (let i = 1; i < phaseState.length; i++) {
    const upstream = phaseState[i - 1];
    const supplied = upstream.done * upstream.passRateForward;
    phaseState[i].available = Math.max(0, supplied - phaseState[i].done);
  }

  // Phases that already meet their target have effectively "ended" before the
  // simulation starts. Mark them so the Gantt and cards have a sensible value
  // (a one-day-wide bar at the global start) and downstream logic treats them
  // as immediately complete.
  for (const p of phaseState) {
    if (p.target === 0 || p.done >= p.target) {
      p.start = new Date(startDate.getTime());
      p.end   = new Date(startDate.getTime());
    }
  }

  // Day-by-day loop. Skip entirely when the last phase is already done.
  let day = new Date(startDate.getTime());
  let safetyHit = false;
  const last = phaseState[phaseState.length - 1];
  const startLoop = last.end == null;
  for (let step = 0; startLoop && step <= SIMULATION_DAY_CAP; step++) {
    const isWorking = (day.getDay() !== 0 && day.getDay() !== 6) || workdays === 7;

    for (let i = 0; i < phaseState.length; i++) {
      const p = phaseState[i];
      const remaining = p.target - p.done;

      // Check override gating first. If the user pinned a start date in the
      // future, skip the phase entirely until then.
      let blockedByOverride = false;
      if (p.startOverride && day < p.startOverride) {
        blockedByOverride = true;
      }

      let consumed = 0;
      if (!blockedByOverride && isWorking && remaining > 0 && p.effectiveRate > 0 && p.available > 0) {
        consumed = Math.min(p.effectiveRate, p.available, remaining);
        p.done += consumed;
        p.available -= consumed;
        // Push downstream supply (limited by what the next phase can ever need).
        const next = phaseState[i + 1];
        if (next) {
          const headroom = Math.max(0, next.target - next.done - next.available);
          next.available += Math.min(consumed * p.passRateForward, headroom);
        }
        if (p.start == null) p.start = new Date(day.getTime());
        if (p.done >= p.target && p.end == null) p.end = new Date(day.getTime());
      }

      p.series.push({
        date: new Date(day.getTime()),
        addedToday: consumed,
        cumulative: p.done,
      });
    }

    // Stop when the last phase has reached its target.
    if (last.end != null) break;

    // Move to next calendar day.
    day = new Date(day.getTime() + 24 * 3600 * 1000);

    if (step === SIMULATION_DAY_CAP) safetyHit = true;
  }

  // Clamp overrides that were earlier than the natural start (we mark them so
  // the UI can warn). The simulator already used the override; if it pre-dates
  // the natural window the bar simply renders from `start` (the first day it
  // actually progressed) — but we still surface the warning.
  for (const p of phaseState) {
    if (p.startOverride && p.start && p.startOverride < p.start) {
      p.startOverrideClamped = true;
    }
  }

  const finalEnd = phaseState[phaseState.length - 1].end;
  return {
    phases: phaseState,
    finalEnd,
    safetyHit,
    startDate,
  };
}

function aggregateAllFeatures(features) {
  const acc = {
    name: "All features",
    required: 0, collected: 0,
    passCuration: 0, failCuration: 0,
    completeAnnotations: 0, pendingAnnotations: 0,
    framesPassReview: 0, framesFailReview: 0, pendingReview: 0,
  };
  for (const f of features) {
    acc.required            += f.required;
    acc.collected           += f.collected;
    acc.passCuration        += f.passCuration;
    acc.failCuration        += f.failCuration;
    acc.completeAnnotations += f.completeAnnotations;
    acc.pendingAnnotations  += f.pendingAnnotations;
    acc.framesPassReview    += f.framesPassReview;
    acc.framesFailReview    += f.framesFailReview;
    acc.pendingReview       += f.pendingReview;
  }
  return acc;
}

function fmtDateInput(d) {
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  return `${yyyy}-${mm}-${dd}`;
}
function parseDateInput(s) {
  // YYYY-MM-DD as local midnight (avoid timezone drift from new Date(s)).
  const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(String(s).trim());
  if (!m) return null;
  return new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
}
function daysBetween(a, b) {
  return Math.max(0, Math.round((b.getTime() - a.getTime()) / (24 * 3600 * 1000)));
}

function renderPredictor(features) {
  const wrap = el("div", { class: "section" });
  wrap.innerHTML = `
    <h2>Forecast calculator</h2>
    <p class="secondary">
      Plan one stage at a time, or stream patients through the whole pipeline at
      once. Defaults assume work starts today.
    </p>
  `;

  // Scope toggle — single stage (legacy) vs whole pipeline (new).
  const scopeToggle = el("div", { class: "mode-toggle scope-toggle", id: "pred-scope-toggle" });
  scopeToggle.innerHTML = `
    <button type="button" data-scope="single" class="active">Single stage</button>
    <button type="button" data-scope="whole">Whole pipeline</button>
  `;
  wrap.appendChild(scopeToggle);

  const grid = el("div", { class: "predictor" });

  // ---- Controls panel
  const controls = el("div", { class: "predictor-controls" });

  const featureOptions = [
    `<option value="__all__">All features (combined)</option>`,
    ...features.map((f) => `<option value="${escapeXml(f.name)}">${escapeXml(f.name)}</option>`),
  ].join("");

  const today = new Date();
  const defaultStart = fmtDateInput(today);
  const defaultEnd = fmtDateInput(new Date(today.getTime() + 30 * 24 * 3600 * 1000));

  controls.innerHTML = `
    <div class="field">
      <label for="pred-feature">Feature</label>
      <select id="pred-feature" class="select">${featureOptions}</select>
    </div>
    <div class="field">
      <label for="pred-stage">Pipeline stage</label>
      <select id="pred-stage" class="select">
        <option value="collection">Phase 1 — Collection (patients)</option>
        <option value="curation">Phase 2 — Curation (patients)</option>
        <option value="annotation">Phase 3 — Annotation (frames)</option>
        <option value="review">Phase 4 — Frame review (frames)</option>
      </select>
    </div>
    <div class="field">
      <label>Driver</label>
      <div class="mode-toggle" id="pred-mode">
        <button type="button" data-mode="end" class="active">End date → rate</button>
        <button type="button" data-mode="rate">Daily rate → end date</button>
      </div>
      <span class="hint">Switch what's the input and what's the output.</span>
    </div>
    <div class="field-row">
      <div class="field">
        <label for="pred-start">Start date</label>
        <input id="pred-start" type="date" class="input" value="${defaultStart}" />
      </div>
      <div class="field" id="pred-end-field">
        <label for="pred-end">End date</label>
        <input id="pred-end" type="date" class="input" value="${defaultEnd}" />
      </div>
      <div class="field" id="pred-rate-field" hidden>
        <label for="pred-rate">Team rate</label>
        <div class="rate-row">
          <input id="pred-rate" type="number" min="0" step="0.5" class="input" value="2" />
          <div class="mode-toggle" id="pred-rate-unit-toggle">
            <button type="button" data-unit="day" class="active">/ day</button>
            <button type="button" data-unit="week">/ week</button>
          </div>
        </div>
        <span class="hint" id="pred-rate-unit">items / working day (team total)</span>
      </div>
    </div>
    <div class="field" id="pred-workers-field" hidden>
      <label for="pred-workers">Workers on this stage</label>
      <input id="pred-workers" type="number" min="1" step="1" class="input" value="1" />
      <span class="hint">Curation, annotation, and frame review are human-bound. Throughput scales with team size.</span>
    </div>
    <div class="field">
      <label for="pred-workdays">Working days per week</label>
      <input id="pred-workdays" type="number" min="1" max="7" step="1" class="input" value="5" />
      <span class="hint">Used to translate calendar days into actual work days.</span>
    </div>
  `;

  // ---- Output panel
  const output = el("div", { class: "predictor-output" });
  output.innerHTML = `
    <div id="pred-summary"></div>
    <div id="pred-stats" class="pred-stat-row"></div>
    <div id="pred-warning"></div>
    <div id="pred-cumulative"></div>
    <div id="pred-rate"></div>
  `;

  grid.appendChild(controls);
  grid.appendChild(output);

  // ============================================================================
  // WHOLE-PIPELINE PANEL — separate controls + output, shown when the user
  // toggles into "Whole pipeline" scope.
  // ============================================================================
  const wholeControls = el("div", { class: "predictor-controls", id: "pred-whole-controls", hidden: true });
  wholeControls.innerHTML = `
    <div class="field">
      <label for="pred-w-feature">Feature</label>
      <select id="pred-w-feature" class="select">${featureOptions}</select>
    </div>
    <div class="field-row">
      <div class="field">
        <label for="pred-w-start">Pipeline start date</label>
        <input id="pred-w-start" type="date" class="input" value="${defaultStart}" />
        <span class="hint">Earliest day any phase can begin.</span>
      </div>
      <div class="field">
        <label for="pred-w-workdays">Working days / week</label>
        <input id="pred-w-workdays" type="number" min="1" max="7" step="1" class="input" value="5" />
      </div>
    </div>
    <div class="field">
      <label>Phase configuration</label>
      <div class="phase-grid" id="pred-w-phase-grid"></div>
      <span class="hint">Workers only apply to human-bound phases. Override start dates lock a phase to a specific day; leave them blank for natural streaming.</span>
    </div>
    <div class="field">
      <label>Pass rates (observed)</label>
      <div class="pass-rates" id="pred-w-pass-rates"></div>
    </div>
  `;

  const wholeOutput = el("div", { class: "predictor-output", id: "pred-whole-output", hidden: true });
  wholeOutput.innerHTML = `
    <div id="pred-w-summary"></div>
    <div id="pred-w-warnings"></div>
    <div id="pred-w-phase-cards" class="phase-card-row"></div>
    <div id="pred-w-gantt"></div>
    <div id="pred-w-cumulative"></div>
  `;

  grid.appendChild(wholeControls);
  grid.appendChild(wholeOutput);
  wrap.appendChild(grid);

  // ---- State + recompute
  const state = {
    mode: "end",
    rateUnit: "day",
    scope: "single",                                // "single" | "whole"
    // Whole-pipeline state holds per-phase rate, unit, workers, and override.
    // Defaults: 2 / day per phase, 1 worker, no override. Live in JS so the
    // user's last entered values survive feature changes.
    whole: {
      phases: PIPELINE_PHASES.map((p) => ({
        id: p.id,
        ratePerDay: 2,
        rateUnit: "day",
        workers: stageIsHumanBound(p.id) ? 2 : 1,
        startOverride: null,                        // YYYY-MM-DD string or null
      })),
    },
  };

  function selectedTarget() {
    const fname = controls.querySelector("#pred-feature").value;
    if (fname === "__all__") return aggregateAllFeatures(features);
    return features.find((f) => f.name === fname) || aggregateAllFeatures(features);
  }
  function selectedStage(target) {
    const stageId = controls.querySelector("#pred-stage").value;
    const stages = stagesForFeature(target);
    return stages.find((s) => s.id === stageId) || stages[0];
  }

  function recompute() {
    const target = selectedTarget();
    const stage = selectedStage(target);
    const remaining = Math.max(0, stage.target - stage.done);
    const humanBound = stageIsHumanBound(stage.id);

    // Workers field is only meaningful for human-bound stages; keep it hidden
    // (and force workers = 1) for collection so the math stays unchanged there.
    controls.querySelector("#pred-workers-field").hidden = !humanBound;

    const startStr = controls.querySelector("#pred-start").value;
    const endStr   = controls.querySelector("#pred-end").value;
    const rateStr  = controls.querySelector("#pred-rate").value;
    const workdays = Math.min(7, Math.max(1, parseInt(controls.querySelector("#pred-workdays").value, 10) || 5));
    const workers  = humanBound
      ? Math.max(1, parseInt(controls.querySelector("#pred-workers").value, 10) || 1)
      : 1;

    const start = parseDateInput(startStr) || new Date();
    let end = parseDateInput(endStr);
    let rateInput = parseFloat(rateStr);
    if (!Number.isFinite(rateInput) || rateInput < 0) rateInput = 0;

    const rateUnitLabel = state.rateUnit === "week" ? "working week" : "working day";
    let rateHintText = `${stage.unit} / ${rateUnitLabel} (team total)`;
    if (state.mode === "rate" && rateInput > 0) {
      // Surface the converted equivalent so the user can sanity-check what
      // they typed is what they meant — e.g. "10 / week ≈ 2.00 / working day".
      const equivDaily = state.rateUnit === "week" ? rateInput / workdays : rateInput;
      const equivWeekly = state.rateUnit === "week" ? rateInput : rateInput * workdays;
      rateHintText += state.rateUnit === "week"
        ? ` — ≈ ${equivDaily.toFixed(2)} / working day`
        : ` — ≈ ${equivWeekly.toFixed(2)} / working week`;
    }
    controls.querySelector("#pred-rate-unit").textContent = rateHintText;

    let dailyRate = 0;        // team total per working day
    let computedEnd = null;
    let warningHTML = "";

    if (state.mode === "end") {
      if (!end || end <= start) {
        warningHTML = "End date must be after start date.";
      } else {
        const totalDays = daysBetween(start, end);
        const workingDays = Math.max(1, Math.round(totalDays * (workdays / 7)));
        dailyRate = remaining / workingDays;
        computedEnd = end;
        if (remaining === 0) warningHTML = `Stage already complete — ${stage.done} / ${stage.target} ${stage.unit}.`;
      }
    } else {
      // The user enters a TEAM total. If the toggle is on /week we divide by
      // working-days-per-week to get the per-working-day team rate the rest
      // of the math (and the projection charts) operate on.
      const dailyTeamRate = state.rateUnit === "week" ? rateInput / workdays : rateInput;
      if (rateInput <= 0) {
        warningHTML = `Team rate must be greater than zero.`;
      } else if (remaining === 0) {
        warningHTML = `Stage already complete — ${stage.done} / ${stage.target} ${stage.unit}.`;
        dailyRate = dailyTeamRate;
        computedEnd = start;
      } else {
        dailyRate = dailyTeamRate;
        const workingDaysNeeded = Math.ceil(remaining / dailyTeamRate);
        const calendarDaysNeeded = Math.ceil(workingDaysNeeded * (7 / workdays));
        computedEnd = new Date(start.getTime() + calendarDaysNeeded * 24 * 3600 * 1000);
      }
    }

    // Derived rates for the KPI tiles.
    const weeklyTeamRate = dailyRate * workdays;
    const perPersonDaily = workers > 0 ? dailyRate / workers : 0;
    const perPersonWeekly = workers > 0 ? weeklyTeamRate / workers : 0;
    const fmtRate = (n) => n > 0 ? n.toFixed(2) : "—";
    function rateValueHTML(daily, weekly) {
      if (!(daily > 0)) return "—";
      return `${fmtRate(daily)}<span class="unit">/ day</span>` +
             `<span class="sep">·</span>` +
             `${fmtRate(weekly)}<span class="unit">/ week</span>`;
    }

    // ---- Summary line
    const fname = controls.querySelector("#pred-feature").value === "__all__"
      ? "All features"
      : target.name;
    const summary = output.querySelector("#pred-summary");
    summary.innerHTML = `
      <div class="row between">
        <div>
          <div class="semibold">${escapeXml(fname)} · ${escapeXml(stage.label)}</div>
          <div class="small secondary">
            ${stage.done} of ${stage.target} ${stage.unit} done · ${remaining} remaining
            ${humanBound ? `· ${workers} worker${workers === 1 ? "" : "s"}` : ""}
          </div>
        </div>
      </div>
    `;

    // ---- KPI tiles (3 normally, 4 when the stage is human-bound).
    const stats = output.querySelector("#pred-stats");
    stats.innerHTML = "";
    stats.appendChild(el("div", { class: "pred-stat info" },
      el("div", { class: "v compact", html: rateValueHTML(dailyRate, weeklyTeamRate) }),
      el("div", { class: "l" }, state.mode === "end" ? "Required team rate" : "Team rate (input)"),
    ));
    if (humanBound) {
      stats.appendChild(el("div", { class: "pred-stat warning" },
        el("div", { class: "v compact", html: rateValueHTML(perPersonDaily, perPersonWeekly) }),
        el("div", { class: "l" }, `Per-person rate (${workers} worker${workers === 1 ? "" : "s"})`),
      ));
    }
    stats.appendChild(el("div", { class: "pred-stat" },
      el("div", { class: "v" }, String(remaining)),
      el("div", { class: "l" }, `${stage.unit} remaining`),
    ));
    stats.appendChild(el("div", { class: "pred-stat success" },
      el("div", { class: "v" }, computedEnd ? formatLoadedAt(computedEnd).split(",")[0] : "—"),
      el("div", { class: "l" }, state.mode === "end" ? "Target end date" : "Predicted end date"),
    ));

    // ---- Warning area
    output.querySelector("#pred-warning").innerHTML = warningHTML
      ? `<div class="pred-warn">${warningHTML}</div>` : "";

    // ---- Charts
    const cumulativeBox = output.querySelector("#pred-cumulative");
    const rateBox       = output.querySelector("#pred-rate");

    if (!computedEnd || dailyRate <= 0) {
      cumulativeBox.innerHTML = "";
      rateBox.innerHTML = "";
      return;
    }

    // Build daily projection from `start` to `computedEnd`. Skip non-working
    // days (we treat the first `workdays` days of each 7-day cycle as work).
    const totalCalDays = Math.max(1, daysBetween(start, computedEnd));
    const cumulativePts = [{ x: new Date(start), y: stage.done }];
    const ratePts = [];
    let acc = stage.done;
    for (let i = 1; i <= totalCalDays; i++) {
      const day = new Date(start.getTime() + i * 24 * 3600 * 1000);
      const isWorking = (day.getDay() !== 0 && day.getDay() !== 6) || workdays === 7;
      // simple model: on working days we add `dailyRate`, otherwise 0.
      const todaysAdd = isWorking ? dailyRate : 0;
      acc = Math.min(stage.target, acc + todaysAdd);
      cumulativePts.push({ x: day, y: acc });
      ratePts.push({ x: day, y: todaysAdd });
    }

    const linearTargetPts = [
      { x: new Date(start), y: stage.done },
      { x: computedEnd,     y: stage.target },
    ];

    cumulativeBox.innerHTML = `
      <h3 style="font-size:14px; margin-bottom:6px">Cumulative ${escapeXml(stage.unit)} over time</h3>
      ${lineChart(
        [
          { name: `Projected cumulative (${stage.unit})`, tone: "info",    points: cumulativePts },
          { name: "Linear path to target",                tone: "success", points: linearTargetPts, dashed: true },
        ],
        { yLabel: stage.unit, target: stage.target, height: 200 }
      )}
    `;

    rateBox.innerHTML = `
      <h3 style="font-size:14px; margin-bottom:6px">Daily ${escapeXml(stage.unit)} added</h3>
      ${lineChart(
        [{ name: `${stage.unit} / day`, tone: "warning", points: ratePts }],
        { yLabel: `${stage.unit}/day`, height: 160 }
      )}
    `;
  }

  // ---- Wire up events
  controls.querySelector("#pred-feature").addEventListener("change", recompute);
  controls.querySelector("#pred-stage").addEventListener("change", recompute);
  controls.querySelector("#pred-start").addEventListener("input", recompute);
  controls.querySelector("#pred-end").addEventListener("input", recompute);
  controls.querySelector("#pred-rate").addEventListener("input", recompute);
  controls.querySelector("#pred-workdays").addEventListener("input", recompute);
  controls.querySelector("#pred-workers").addEventListener("input", recompute);
  controls.querySelectorAll("#pred-mode button").forEach((btn) => {
    btn.addEventListener("click", () => {
      state.mode = btn.dataset.mode;
      controls.querySelectorAll("#pred-mode button").forEach((b) =>
        b.classList.toggle("active", b === btn));
      controls.querySelector("#pred-end-field").hidden  = state.mode !== "end";
      controls.querySelector("#pred-rate-field").hidden = state.mode !== "rate";
      recompute();
    });
  });
  controls.querySelectorAll("#pred-rate-unit-toggle button").forEach((btn) => {
    btn.addEventListener("click", () => {
      state.rateUnit = btn.dataset.unit;
      controls.querySelectorAll("#pred-rate-unit-toggle button").forEach((b) =>
        b.classList.toggle("active", b === btn));
      recompute();
    });
  });

  // Pre-select the first feature that actually has a non-zero target so the
  // initial view is useful.
  const firstUseful = features.find((f) => f.required > 0) || features[0];
  if (firstUseful) controls.querySelector("#pred-feature").value = firstUseful.name;

  // ============================================================================
  // WHOLE-PIPELINE RENDERING + WIRING
  // ============================================================================

  function selectedWholeTarget() {
    const fname = wholeControls.querySelector("#pred-w-feature").value;
    if (fname === "__all__") return aggregateAllFeatures(features);
    return features.find((f) => f.name === fname) || aggregateAllFeatures(features);
  }

  // Render the 4-row phase configuration grid. Re-renders on feature change so
  // labels and the funnel preview stay in sync.
  function renderPhaseGrid() {
    const host = wholeControls.querySelector("#pred-w-phase-grid");
    host.innerHTML = "";
    state.whole.phases.forEach((phaseCfg, idx) => {
      const meta = PIPELINE_PHASES.find((p) => p.id === phaseCfg.id);
      const humanBound = stageIsHumanBound(phaseCfg.id);
      const overrideOn = phaseCfg.startOverride != null;
      const row = el("div", { class: "phase-row" });
      row.innerHTML = `
        <div class="phase-label">${escapeXml(meta.label.replace(/^Phase \d+ — /, ""))}</div>
        <div class="phase-rate">
          <input type="number" min="0" step="0.5" class="input"
                 data-phase="${phaseCfg.id}" data-field="rate"
                 value="${phaseCfg.ratePerDay}" />
          <div class="mode-toggle" data-phase="${phaseCfg.id}" data-field="rate-unit">
            <button type="button" data-unit="day" class="${phaseCfg.rateUnit === "day" ? "active" : ""}">/ day</button>
            <button type="button" data-unit="week" class="${phaseCfg.rateUnit === "week" ? "active" : ""}">/ week</button>
          </div>
        </div>
        <input type="number" min="1" step="1" class="input"
               data-phase="${phaseCfg.id}" data-field="workers"
               value="${phaseCfg.workers}"
               ${humanBound ? "" : "disabled title='Collection is not human-bound'"} />
        <div class="start-cell">
          <div class="start-row">
            <input type="date" class="input"
                   data-phase="${phaseCfg.id}" data-field="override"
                   value="${phaseCfg.startOverride || ""}"
                   ${overrideOn ? "" : "disabled"} />
          </div>
          <label class="override-toggle">
            <input type="checkbox" data-phase="${phaseCfg.id}" data-field="override-toggle"
                   ${overrideOn ? "checked" : ""} />
            Override start
          </label>
        </div>
      `;
      // Header row above the first phase: column titles.
      if (idx === 0) {
        const header = el("div", { class: "phase-row", style: "background:transparent;border-color:transparent;padding-bottom:0;" });
        header.innerHTML = `
          <div class="phase-label">Phase</div>
          <div class="phase-label">Team rate</div>
          <div class="phase-label">Workers</div>
          <div class="phase-label">Start (override)</div>
        `;
        host.appendChild(header);
      }
      host.appendChild(row);
    });
  }

  function renderPassRates(funnel) {
    const host = wholeControls.querySelector("#pred-w-pass-rates");
    const cur = funnel.passRates.curation;
    const anno = funnel.passRates.annotation;
    const curPct = (cur * 100).toFixed(0);
    const annoPct = (anno * 100).toFixed(0);
    host.innerHTML = `
      <span>Collection → Curation: <span class="semibold">100%</span></span>
      <span>Curation → Annotation: <span class="semibold">${curPct}%</span>${funnel.hasCurationHistory ? "" : " (assumed — no curation history yet)"}</span>
      <span>Annotation → Review: <span class="semibold">${annoPct}%</span> (assumed)</span>
    `;
  }

  function wholeRecompute() {
    const target = selectedWholeTarget();
    const startStr = wholeControls.querySelector("#pred-w-start").value;
    const start = parseDateInput(startStr) || new Date();
    const workdays = Math.min(7, Math.max(1, parseInt(wholeControls.querySelector("#pred-w-workdays").value, 10) || 5));

    const funnel = buildPipelineFunnel(target);
    renderPassRates(funnel);

    // Translate per-phase team rate (day or week) into a per-working-day rate
    // and pass overrides through. simulatePipeline applies workers internally.
    const simPhases = state.whole.phases.map((cfg) => {
      const ratePerDay = cfg.rateUnit === "week"
        ? (Number(cfg.ratePerDay) || 0) / workdays
        : (Number(cfg.ratePerDay) || 0);
      return {
        id: cfg.id,
        ratePerDay,
        workers: cfg.workers,
        startOverride: cfg.startOverride ? parseDateInput(cfg.startOverride) : null,
      };
    });

    const sim = simulatePipeline(funnel, { startDate: start, workdays, phases: simPhases });

    // ---- Summary
    const fname = wholeControls.querySelector("#pred-w-feature").value === "__all__"
      ? "All features"
      : target.name;
    const summary = wholeOutput.querySelector("#pred-w-summary");
    const finalEnd = sim.finalEnd;
    const totalCalDays = finalEnd
      ? Math.max(1, daysBetween(start, finalEnd))
      : null;
    summary.innerHTML = `
      <div class="row between">
        <div>
          <div class="semibold">${escapeXml(fname)} · whole pipeline forecast</div>
          <div class="small secondary">
            ${finalEnd
              ? `Final review done by <span class="semibold">${formatLoadedAt(finalEnd).split(",")[0]}</span> · ${totalCalDays} calendar days from start`
              : `Pipeline does not finish within the simulation window`}
          </div>
        </div>
      </div>
    `;

    // ---- Warnings
    const warnings = [];
    if (!funnel.hasCurationHistory) {
      warnings.push("No curation history yet — using 100% pass rate from curation to annotation. Outputs will narrow once real curation data accumulates.");
    }
    sim.phases.forEach((p) => {
      const cfg = state.whole.phases.find((x) => x.id === p.id);
      if (p.remainingInitial > 0 && p.effectiveRate <= 0) {
        warnings.push(`${PIPELINE_PHASES.find((m) => m.id === p.id).label}: rate is 0 — pipeline will not finish.`);
      }
      if (p.startOverrideClamped) {
        warnings.push(`${PIPELINE_PHASES.find((m) => m.id === p.id).label}: override start is before the upstream phase delivers any patients — using natural start instead.`);
      }
    });
    if (sim.safetyHit) {
      warnings.push(`Pipeline did not finish within ${SIMULATION_DAY_CAP} days at these rates. Increase rates/workers or shorten the workload.`);
    }
    const warnHost = wholeOutput.querySelector("#pred-w-warnings");
    warnHost.innerHTML = warnings.length
      ? warnings.map((w) => `<div class="pred-warn" style="margin-bottom:6px">${escapeXml(w)}</div>`).join("")
      : "";

    // ---- Phase strip cards
    const cardHost = wholeOutput.querySelector("#pred-w-phase-cards");
    cardHost.innerHTML = "";
    sim.phases.forEach((p) => {
      const cfg = state.whole.phases.find((x) => x.id === p.id);
      const meta = PIPELINE_PHASES.find((m) => m.id === p.id);
      const card = el("div", { class: `phase-card t-${p.tone}` });
      const dateRange = (p.start && p.end)
        ? `${p.start.toLocaleDateString(undefined, { month: "short", day: "2-digit" })} → ${p.end.toLocaleDateString(undefined, { month: "short", day: "2-digit", year: "numeric" })}`
        : "—";
      const remaining = Math.max(0, p.target - p.done);
      const rateLabel = cfg.rateUnit === "week"
        ? `${cfg.ratePerDay} / week`
        : `${cfg.ratePerDay} / day`;
      const workersLabel = stageIsHumanBound(p.id) ? ` · ${p.workers} worker${p.workers === 1 ? "" : "s"}` : "";
      card.innerHTML = `
        <div class="pc-title">${escapeXml(meta.label)}</div>
        <div class="pc-dates">${escapeXml(dateRange)}</div>
        <div class="pc-meta">${Math.round(p.done)} / ${p.target} ${p.unit} · ${remaining} remaining</div>
        <div class="pc-meta">${escapeXml(rateLabel)}${escapeXml(workersLabel)}</div>
        ${cfg.startOverride
          ? `<span class="pc-pill">manually started ${escapeXml(cfg.startOverride)}</span>`
          : ""}
      `;
      cardHost.appendChild(card);
    });

    // ---- Gantt + cumulative chart
    const ganttHost = wholeOutput.querySelector("#pred-w-gantt");
    const cumulativeHost = wholeOutput.querySelector("#pred-w-cumulative");
    if (!finalEnd) {
      ganttHost.innerHTML = "";
      cumulativeHost.innerHTML = "";
      return;
    }
    const ganttPhases = sim.phases.map((p) => {
      const cfg = state.whole.phases.find((x) => x.id === p.id);
      return {
        id: p.id,
        label: PIPELINE_PHASES.find((m) => m.id === p.id).label,
        tone: p.tone,
        start: p.start,
        end: p.end,
        startOverride: cfg.startOverride ? parseDateInput(cfg.startOverride) : null,
        target: p.target,
        done: p.done,
      };
    });
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    ganttHost.innerHTML = `
      <div class="gantt-card">
        <h3 style="font-size:14px;">Pipeline timeline (Gantt)</h3>
        ${ganttBarsSVG(ganttPhases, {
          startDate: start,
          endDate: finalEnd,
          todayMarker: today,
        })}
      </div>
    `;

    // Sample cumulative series at ~1 point per calendar day, but cap density
    // so very long timelines stay smooth.
    const sampleEvery = Math.max(1, Math.floor(sim.phases[0].series.length / 200));
    const cumulativeSeries = sim.phases.map((p) => ({
      name: PIPELINE_PHASES.find((m) => m.id === p.id).label,
      tone: p.tone,
      points: p.series
        .filter((_, idx) => idx % sampleEvery === 0 || idx === p.series.length - 1)
        .map((s) => ({ x: s.date, y: s.cumulative })),
    }));
    cumulativeHost.innerHTML = `
      <div class="gantt-card">
        <h3 style="font-size:14px;">Cumulative patients per phase</h3>
        ${lineChart(cumulativeSeries, {
          yLabel: "patients",
          height: 220,
        })}
      </div>
    `;
  }

  // Initial phase grid render.
  renderPhaseGrid();

  // ---- Whole-pipeline event wiring (delegated where possible)
  wholeControls.querySelector("#pred-w-feature").addEventListener("change", () => {
    // Pre-fill workers from feature aggregate? No — workers stay at user value.
    wholeRecompute();
  });
  wholeControls.querySelector("#pred-w-start").addEventListener("input", wholeRecompute);
  wholeControls.querySelector("#pred-w-workdays").addEventListener("input", wholeRecompute);

  // Delegate input/click to the phase-grid host so re-renders don't lose listeners.
  wholeControls.querySelector("#pred-w-phase-grid").addEventListener("input", (ev) => {
    const t = ev.target;
    const phaseId = t.dataset.phase;
    const field = t.dataset.field;
    if (!phaseId || !field) return;
    const phaseCfg = state.whole.phases.find((p) => p.id === phaseId);
    if (!phaseCfg) return;
    if (field === "rate") phaseCfg.ratePerDay = Math.max(0, parseFloat(t.value) || 0);
    else if (field === "workers") phaseCfg.workers = Math.max(1, parseInt(t.value, 10) || 1);
    else if (field === "override") phaseCfg.startOverride = t.value || null;
    wholeRecompute();
  });
  wholeControls.querySelector("#pred-w-phase-grid").addEventListener("click", (ev) => {
    const btn = ev.target.closest("button");
    const checkbox = ev.target.matches("input[type=checkbox][data-field='override-toggle']") ? ev.target : null;
    if (btn) {
      const wrap = btn.closest("[data-field='rate-unit']");
      if (!wrap) return;
      const phaseId = wrap.dataset.phase;
      const phaseCfg = state.whole.phases.find((p) => p.id === phaseId);
      if (!phaseCfg) return;
      phaseCfg.rateUnit = btn.dataset.unit;
      wrap.querySelectorAll("button").forEach((b) => b.classList.toggle("active", b === btn));
      wholeRecompute();
    } else if (checkbox) {
      const phaseId = checkbox.dataset.phase;
      const phaseCfg = state.whole.phases.find((p) => p.id === phaseId);
      if (!phaseCfg) return;
      if (checkbox.checked) {
        // Default override to the global pipeline start so the user has a
        // sensible date pre-filled they can immediately edit.
        const startStr = wholeControls.querySelector("#pred-w-start").value;
        phaseCfg.startOverride = startStr;
      } else {
        phaseCfg.startOverride = null;
      }
      renderPhaseGrid();
      wholeRecompute();
    }
  });

  // ---- Scope toggle wiring
  function applyScope() {
    const isWhole = state.scope === "whole";
    controls.hidden = isWhole;
    output.hidden = isWhole;
    wholeControls.hidden = !isWhole;
    wholeOutput.hidden = !isWhole;
    if (isWhole) wholeRecompute();
    else recompute();
  }
  scopeToggle.querySelectorAll("button").forEach((btn) => {
    btn.addEventListener("click", () => {
      state.scope = btn.dataset.scope;
      scopeToggle.querySelectorAll("button").forEach((b) =>
        b.classList.toggle("active", b === btn));
      applyScope();
    });
  });

  // Sync the whole-pipeline feature dropdown to the same default as single mode.
  if (firstUseful) wholeControls.querySelector("#pred-w-feature").value = firstUseful.name;

  // Defer initial compute until the node is in the DOM (chart sizing relies on
  // viewBox so it's fine immediately, but the input wiring needs the elements
  // to exist — they do at this point).
  setTimeout(recompute, 0);

  return wrap;
}

// ============================================================================
// MAIN RENDER — takes parsed state and (re)builds the dashboard.
// ============================================================================
function renderDashboard(state) {
  const { features, probes, sourceLabel, loadedAt } = state;

  const TOTAL_REQUIRED             = sum(features, "required");
  const TOTAL_COLLECTED            = sum(features, "collected");
  const TOTAL_PASS                 = sum(features, "passCuration");
  const TOTAL_FAIL                 = sum(features, "failCuration");
  const TOTAL_PENDING_CURATION     = sum(features, "pendingCuration");
  const TOTAL_PENDING_ANNOTATIONS  = sum(features, "pendingAnnotations");
  const TOTAL_COMPLETE_ANNOTATIONS = sum(features, "completeAnnotations");
  const TOTAL_PENDING_REVIEW       = sum(features, "pendingReview");
  const TOTAL_FRAMES_PASS          = sum(features, "framesPassReview");
  const TOTAL_FRAMES_FAIL          = sum(features, "framesFailReview");

  const PHASE_3_HAS_DATA = TOTAL_PENDING_ANNOTATIONS + TOTAL_COMPLETE_ANNOTATIONS > 0;
  const PHASE_4_HAS_DATA = TOTAL_PENDING_REVIEW + TOTAL_FRAMES_PASS + TOTAL_FRAMES_FAIL > 0;

  const OVERALL_PCT = TOTAL_REQUIRED ? Math.round((TOTAL_COLLECTED / TOTAL_REQUIRED) * 100) : 0;
  const PASS_RATE   = TOTAL_PASS + TOTAL_FAIL > 0 ? Math.round((TOTAL_PASS / (TOTAL_PASS + TOTAL_FAIL)) * 100) : 0;
  const GAP         = TOTAL_REQUIRED - TOTAL_COLLECTED;

  const externalOnlyFeatures = features.filter((f) => f.sourceCoverage === "external-only");
  const internalOnlyFeatures = features.filter((f) => f.sourceCoverage === "internal-only");
  const bothFeatures         = features.filter((f) => f.sourceCoverage === "both");
  const externalOnlyRequired = sum(externalOnlyFeatures, "required");
  const bothRequired         = sum(bothFeatures, "required");

  const onTrack    = features.filter((f) => pctOf(f.collected, f.required) >= 80);
  const lagging    = features.filter((f) => f.collected > 0 && pctOf(f.collected, f.required) < 40);
  const notStarted = features.filter((f) => f.collected === 0);

  const app = document.getElementById("app");
  app.innerHTML = "";

  // Toolbar
  const toolbar = el("div", { class: "toolbar" });
  toolbar.innerHTML = `
    <div class="toolbar-info">
      <span><span class="tertiary">Source:</span> <code class="mono">${escapeXml(sourceLabel)}</code></span>
      <span><span class="tertiary">Loaded:</span> ${formatLoadedAt(loadedAt)}</span>
      <span><span class="tertiary">Rows:</span> ${features.length} features · ${probes.length} probes</span>
    </div>
    <div class="toolbar-actions">
      <button class="btn" id="toolbar-reload">Reload from disk</button>
      <button class="btn" id="toolbar-pick">Load other CSV...</button>
    </div>
  `;
  app.appendChild(toolbar);

  // Header
  const header = el("div", { class: "header-block" });
  header.innerHTML = `
    <div class="meta-row">
      <span class="tertiary semibold"><code class="mono">${escapeXml(sourceLabel)}</code> · Chameleon system</span>
      <span class="tertiary">Loaded: ${formatLoadedAt(loadedAt)}</span>
    </div>
    <h1>Feature × Probe data collection — pipeline status</h1>
    <p class="secondary">
      Per-row tracking of patient data acquisition for ${features.length} clinical
      ultrasound features across ${probes.length} probe models, split by
      internal / external source.
    </p>
  `;
  app.appendChild(header);

  // Stats
  const statRow = el("div", { class: "grid-4" });
  statRow.appendChild(statCard(TOTAL_REQUIRED.toLocaleString(), "Patients required (target)"));
  statRow.appendChild(statCard(TOTAL_COLLECTED.toLocaleString(), `Collected (${OVERALL_PCT}%)`, "info"));
  statRow.appendChild(statCard(TOTAL_PASS.toLocaleString(), `Passed curation (${pctOf(TOTAL_PASS, TOTAL_REQUIRED)}%)`, "success"));
  statRow.appendChild(statCard(GAP.toLocaleString(), "Gap to target", "warning"));
  app.appendChild(statRow);

  // Hero progress
  const collectedPct = TOTAL_REQUIRED ? (TOTAL_COLLECTED / TOTAL_REQUIRED) * 100 : 0;
  const passedPct    = TOTAL_REQUIRED ? (TOTAL_PASS / TOTAL_REQUIRED) * 100 : 0;
  const hero = el("div", { class: "hero" });
  hero.innerHTML = `
    <div class="top">
      <span class="semibold">Collection progress against full target</span>
      <span class="tertiary">${TOTAL_COLLECTED} collected · ${TOTAL_PASS} passed curation · ${GAP} still missing</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" style="width:${collectedPct}%; background:var(--accent-primary)"></div>
      <div class="progress-fill" style="width:${passedPct}%;    background:var(--accent-success)"></div>
    </div>
    <div class="legend">
      <div class="legend-item"><span class="swatch" style="background:var(--accent-success)"></span><span class="small secondary">Passed curation (${pctOf(TOTAL_PASS, TOTAL_REQUIRED)}%)</span></div>
      <div class="legend-item"><span class="swatch" style="background:var(--accent-primary)"></span><span class="small secondary">Collected (${OVERALL_PCT}%)</span></div>
      <div class="legend-item"><span class="swatch outline" style="background:var(--fill-tertiary)"></span><span class="small secondary">Remaining (${100 - OVERALL_PCT}%)</span></div>
    </div>
  `;
  app.appendChild(hero);

  // Forecast / predictor
  app.appendChild(renderPredictor(features));

  // What this file describes
  const whatSection = el("div", { class: "section" });
  whatSection.innerHTML = `
    <h2>What this file describes</h2>
    <p class="secondary">
      Each detail row is a unique combination of a clinical <span class="semibold">feature</span>
      (e.g. <code class="mono">bladder</code>, <code class="mono">vti</code>, <code class="mono">cnerve</code>),
      a <span class="semibold">probe model</span> (transducer such as
      <code class="mono">15C</code>, <code class="mono">L420t</code>, <code class="mono">Air12L</code>),
      and a <span class="semibold">source group</span>
      (<code class="mono">internal</code> vs <code class="mono">external</code>).
      All rows target the <code class="mono">Chameleon</code> imaging system.
      Subtotal rows ending in &ldquo;total&rdquo; aggregate per feature.
    </p>
    <div class="grid-4">
      <div class="card">
        <div class="card-header">Phase 1 — Collection</div>
        <div class="card-body">
          <span class="small secondary">How many patients were physically acquired and queued for multiframe extraction.</span>
          <code class="mono">patients_collected</code>
          <code class="mono">patients_pending_multiframe</code>
          <code class="mono">…_not_collected</code>
        </div>
      </div>
      <div class="card">
        <div class="card-header">Phase 2 — Curation</div>
        <div class="card-body">
          <span class="small secondary">Quality screening: each collected patient passes or fails curation.</span>
          <code class="mono">patients_pending_curation</code>
          <code class="mono">patients_pass_curation</code>
          <code class="mono">patients_failed_curation</code>
        </div>
      </div>
      <div class="card">
        <div class="card-header">Phase 3 — Annotation</div>
        <div class="card-body">
          <span class="small secondary">Frame-level labelling of curated cases.</span>
          <code class="mono">pending_annotations</code>
          <code class="mono">Complete_annotations</code>
        </div>
      </div>
      <div class="card">
        <div class="card-header">Phase 4 — Frame review</div>
        <div class="card-body">
          <span class="small secondary">Reviewer sign-off on annotated frames.</span>
          <code class="mono">Pending Review</code>
          <code class="mono">Frames_pass_Review</code>
          <code class="mono">Frames_failed_Review</code>
        </div>
      </div>
    </div>
  `;
  app.appendChild(whatSection);

  app.appendChild(el("hr", { class: "divider" }));

  // Per-feature progress table
  const tableSection = el("div", { class: "section" });
  tableSection.innerHTML = `
    <h2>Per-feature progress</h2>
    <p class="secondary">Sorted by patients collected. Status is based on collection percentage of the per-feature target.</p>
  `;
  const sortedByCollected = [...features].sort((a, b) => b.collected - a.collected);
  let tableHTML = `
    <div class="table-wrap"><table>
      <thead><tr>
        <th class="left">Feature</th>
        <th class="left">Source coverage</th>
        <th class="right">Required</th>
        <th class="right">Collected</th>
        <th class="right">% complete</th>
        <th class="right">In curation</th>
        <th class="right">Pass</th>
        <th class="right">Fail</th>
        <th class="left">Status</th>
      </tr></thead>
      <tbody>`;
  for (const f of sortedByCollected) {
    const pct = pctOf(f.collected, f.required);
    const status = statusFor(f);
    tableHTML += `<tr>
      <td class="left semibold">${escapeXml(f.name)}</td>
      <td class="left">${sourcePill(f.sourceCoverage)}</td>
      <td class="right">${f.required}</td>
      <td class="right">${f.collected}</td>
      <td class="right">${pct}%</td>
      <td class="right">${f.pendingCuration}</td>
      <td class="right">${f.passCuration}</td>
      <td class="right">${f.failCuration}</td>
      <td class="left">${pillHTML(status.label, status.tone)}</td>
    </tr>`;
  }
  tableHTML += `</tbody></table></div>`;
  const tableWrap = el("div");
  tableWrap.innerHTML = tableHTML;
  tableSection.appendChild(tableWrap);
  app.appendChild(tableSection);

  // Two-column charts
  const chartsRow = el("div", { class: "grid-2-1" });
  const sortedByPct = [...features].sort((a, b) => pctOf(b.collected, b.required) - pctOf(a.collected, a.required));

  const colCollection = el("div", { class: "chart-card" });
  colCollection.innerHTML = `
    <h3>Collection vs gap, per feature</h3>
    ${horizontalBarChart(
      sortedByPct.map((f) => f.name),
      [
        { name: "Collected",            data: sortedByPct.map((f) => f.collected), tone: "success" },
        { name: "Remaining vs target",  data: sortedByPct.map((f) => Math.max(f.required - f.collected, 0)), tone: "neutral" },
      ],
      { stacked: true }
    )}
  `;
  chartsRow.appendChild(colCollection);

  const colDonut = el("div", { class: "chart-card" });
  colDonut.innerHTML = `
    <h3>Curation outcomes</h3>
    ${donutChart([
      { label: "Passed",          value: TOTAL_PASS,             tone: "success" },
      { label: "Failed",          value: TOTAL_FAIL,             tone: "danger"  },
      { label: "Pending curation", value: TOTAL_PENDING_CURATION, tone: "warning" },
    ])}
    <p class="small secondary" style="margin-top:6px">
      Of the ${TOTAL_PASS + TOTAL_FAIL} patients fully curated so far,
      ${PASS_RATE}% passed. Another ${TOTAL_PENDING_CURATION} are still waiting to be curated.
    </p>
  `;
  chartsRow.appendChild(colDonut);
  app.appendChild(chartsRow);

  // Funnel
  const funnelSection = el("div", { class: "section" });
  funnelSection.innerHTML = `
    <h2>Patient-level pipeline funnel</h2>
    <p class="secondary">Snapshot of where collected patients currently sit in the pipeline.</p>
    <div class="chart-card">
      ${horizontalBarChart(
        ["Required", "Collected", "Pending curation", "Passed curation", "Failed curation"],
        [{ name: "Patients", data: [TOTAL_REQUIRED, TOTAL_COLLECTED, TOTAL_PENDING_CURATION, TOTAL_PASS, TOTAL_FAIL], tone: "info" }],
        { stacked: false }
      )}
    </div>
  `;
  app.appendChild(funnelSection);

  app.appendChild(el("hr", { class: "divider" }));

  // Phase 3 & 4
  if (!PHASE_3_HAS_DATA && !PHASE_4_HAS_DATA) {
    app.appendChild(callout(
      "warning",
      "Phases 3 & 4 are not active yet",
      `The columns for <code class="mono">pending_annotations</code>,
       <code class="mono">Complete_annotations</code>,
       <code class="mono">Pending Review</code>,
       <code class="mono">Frames_pass_Review</code> and
       <code class="mono">Frames_failed_Review</code> contain no values in the source CSV.
       The pipeline has not yet produced any annotated or reviewed frames —
       work to date is patient-level only (Phases 1–2).`
    ));
  } else {
    const phaseSection = el("div", { class: "section" });
    phaseSection.innerHTML = `<h2>Annotation & frame review</h2>`;
    const grid = el("div", { class: "grid-4" });
    grid.appendChild(statCard(TOTAL_PENDING_ANNOTATIONS.toLocaleString(), "Pending annotations", PHASE_3_HAS_DATA ? "warning" : ""));
    grid.appendChild(statCard(TOTAL_COMPLETE_ANNOTATIONS.toLocaleString(), "Annotated frames",   PHASE_3_HAS_DATA ? "success" : ""));
    grid.appendChild(statCard(TOTAL_FRAMES_PASS.toLocaleString(), "Frames passed review",        PHASE_4_HAS_DATA ? "success" : ""));
    grid.appendChild(statCard(TOTAL_FRAMES_FAIL.toLocaleString(), "Frames failed review",        PHASE_4_HAS_DATA ? "danger"  : ""));
    phaseSection.appendChild(grid);

    if (PHASE_3_HAS_DATA) {
      const sortedAnno = [...features].sort((a, b) => b.completeAnnotations - a.completeAnnotations);
      const card = el("div", { class: "chart-card" });
      card.innerHTML = `
        <h3>Annotation progress per feature</h3>
        ${horizontalBarChart(
          sortedAnno.map((f) => f.name),
          [
            { name: "Complete", data: sortedAnno.map((f) => f.completeAnnotations), tone: "success" },
            { name: "Pending",  data: sortedAnno.map((f) => f.pendingAnnotations),  tone: "warning" },
          ],
          { stacked: true }
        )}
      `;
      phaseSection.appendChild(card);
    }

    if (PHASE_4_HAS_DATA) {
      const sortedRev = [...features].sort((a, b) =>
        (b.framesPassReview + b.framesFailReview) - (a.framesPassReview + a.framesFailReview));
      const card = el("div", { class: "chart-card" });
      card.innerHTML = `
        <h3>Frame review outcomes per feature</h3>
        ${horizontalBarChart(
          sortedRev.map((f) => f.name),
          [
            { name: "Pass",    data: sortedRev.map((f) => f.framesPassReview), tone: "success" },
            { name: "Fail",    data: sortedRev.map((f) => f.framesFailReview), tone: "danger"  },
            { name: "Pending", data: sortedRev.map((f) => f.pendingReview),    tone: "warning" },
          ],
          { stacked: true }
        )}
      `;
      phaseSection.appendChild(card);
    }
    app.appendChild(phaseSection);
  }

  app.appendChild(el("hr", { class: "divider" }));

  // Source-group split
  const sourceSection = el("div", { class: "section" });
  sourceSection.innerHTML = `<h2>Source-group split</h2>`;
  if (TOTAL_COLLECTED > 0 && externalOnlyFeatures.every((f) => f.collected === 0)) {
    sourceSection.appendChild(callout(
      "danger",
      "Zero external collection so far",
      `Across every feature that has any external probe rows,
       <span class="semibold">patients_collected = 0</span>.
       All ${TOTAL_COLLECTED} collected patients in the file come from the
       <code class="mono">internal</code> source group.`
    ));
  }
  const sourceGrid = el("div", { class: "grid-3" });
  function sourceCard(title, tone, fs, bodyText) {
    const card = el("div", { class: "card" });
    card.innerHTML = `
      <div class="card-header">
        <span>${escapeXml(title)}</span>
        ${pillHTML(`${fs.length} features`, tone)}
      </div>
      <div class="card-body">
        <span class="small secondary">${bodyText}</span>
        <div class="pill-row">
          ${fs.map((f) => pillHTML(f.name, tone === "info" ? "neutral" : tone)).join("")}
        </div>
      </div>
    `;
    return card;
  }
  sourceGrid.appendChild(sourceCard("internal-only features", "info",
    internalOnlyFeatures, "No external rows exist for these."));
  sourceGrid.appendChild(sourceCard("external-only features", "warning",
    externalOnlyFeatures, `${externalOnlyRequired} required patients across these.`));
  sourceGrid.appendChild(sourceCard("internal + external", "neutral",
    bothFeatures, `${bothRequired} required patients combined.`));
  sourceSection.appendChild(sourceGrid);
  app.appendChild(sourceSection);

  app.appendChild(el("hr", { class: "divider" }));

  // Probe models
  const probesSection = el("div", { class: "section" });
  probesSection.innerHTML = `
    <h2>Probe models in scope</h2>
    <p class="secondary">${probes.length} distinct probe models appear across the rows.</p>
    <div class="pill-row">
      ${probes.map((p) => pillHTML(p, "neutral")).join("")}
    </div>
  `;
  app.appendChild(probesSection);

  app.appendChild(el("hr", { class: "divider" }));

  // Key findings
  const findings = el("div", { class: "section" });
  findings.innerHTML = `<h2>Key findings</h2>`;
  const findingsStack = el("div", { class: "stack", style: "gap: 10px;" });

  findingsStack.appendChild(callout(
    "info",
    `Overall progress sits at ~${OVERALL_PCT}%`,
    `${TOTAL_COLLECTED.toLocaleString()} of ${TOTAL_REQUIRED.toLocaleString()} required patients have been collected.
     ${GAP.toLocaleString()} are still missing before Phase 1 is complete.`
  ));
  if (onTrack.length > 0) {
    findingsStack.appendChild(callout(
      "success",
      `${onTrack.length} feature${onTrack.length === 1 ? "" : "s"} at or above 80%`,
      onTrack.map((f) => `${f.name} (${pctOf(f.collected, f.required)}%)`).join(", ") + "."
    ));
  }
  if (lagging.length > 0) {
    findingsStack.appendChild(callout(
      "warning",
      `${lagging.length} feature${lagging.length === 1 ? "" : "s"} lagging behind`,
      lagging.map((f) => `${f.name} (${pctOf(f.collected, f.required)}%)`).join(", ") + "."
    ));
  }
  if (notStarted.length > 0) {
    findingsStack.appendChild(callout(
      "danger",
      `${notStarted.length} feature${notStarted.length === 1 ? "" : "s"} not started`,
      `${notStarted.map((f) => f.name).join(", ")} — combined target of
       ${notStarted.reduce((s, f) => s + f.required, 0).toLocaleString()} patients.`
    ));
  }
  if (TOTAL_PASS + TOTAL_FAIL > 0) {
    findingsStack.appendChild(callout(
      "success",
      `Curation pass rate: ${PASS_RATE}%`,
      `Of patients fully curated so far, ${PASS_RATE}% pass
       (${TOTAL_PASS} pass vs ${TOTAL_FAIL} fail).`
    ));
  }
  findings.appendChild(findingsStack);
  app.appendChild(findings);

  // Wire up toolbar buttons
  document.getElementById("toolbar-reload").onclick = () => tryLoadDefault();
  document.getElementById("toolbar-pick").onclick   = () => document.getElementById("file-input").click();
}

// ============================================================================
// LOADING + UI STATES
// ============================================================================
function showLoading() {
  document.getElementById("loader").hidden = false;
  document.getElementById("error").hidden = true;
  document.getElementById("app").hidden = true;
}
function showError(title, msg, detail = "", help = "") {
  document.getElementById("loader").hidden = true;
  const errBox = document.getElementById("error");
  errBox.hidden = false;
  document.getElementById("app").hidden = true;
  document.getElementById("error-title").textContent = title;
  document.getElementById("error-msg").textContent = msg;
  const det = document.getElementById("error-detail");
  if (detail) { det.hidden = false; det.textContent = detail; } else { det.hidden = true; }
  document.getElementById("error-help").innerHTML = help;
}
function showApp() {
  document.getElementById("loader").hidden = true;
  document.getElementById("error").hidden = true;
  document.getElementById("app").hidden = false;
}

async function loadFromURL(url) {
  const resp = await fetch(url, { cache: "no-store" });
  if (!resp.ok) throw new Error(`HTTP ${resp.status} ${resp.statusText}`);
  return resp.text();
}
function loadFromFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload  = (e) => resolve(e.target.result);
    reader.onerror = () => reject(reader.error || new Error("read error"));
    reader.readAsText(file);
  });
}

function processText(text, sourceLabel) {
  let rows;
  try { rows = parseCSV(text); }
  catch (e) {
    showError("Failed to parse CSV", `The file at '${sourceLabel}' could not be parsed as CSV.`, String(e && e.message ? e.message : e));
    return;
  }
  const { features, probes } = aggregateFromCSV(rows);
  if (features.length === 0) {
    showError(
      "No feature rows found",
      `Parsed '${sourceLabel}' but it has no detail rows (rows with both source_group and probe_group set).`,
      `Parsed rows: ${rows.length}. Expected the first two rows to be headers, then detail rows like 'bladder,internal,15C,Chameleon,...'.`,
    );
    return;
  }
  renderDashboard({ features, probes, sourceLabel, loadedAt: new Date() });
  showApp();
}

async function tryLoadDefault() {
  showLoading();
  document.getElementById("loader-path").textContent = DEFAULT_CSV_PATH;
  try {
    const text = await loadFromURL(DEFAULT_CSV_PATH);
    processText(text, DEFAULT_CSV_PATH);
  } catch (e) {
    const isFileProto = location.protocol === "file:";
    const msg = `Could not fetch '${DEFAULT_CSV_PATH}'.`;
    const help = isFileProto
      ? `<strong>Tip:</strong> Browsers block local file access from <code class="mono">file://</code> URLs. To auto-load
         the latest CSV, double-click <code class="mono">Open Dashboard.command</code> in Finder. Or drag-and-drop a
         CSV file anywhere on this page right now, or click <em>Choose a CSV file</em> below.`
      : `Drop a CSV file anywhere on this page, or click <em>Choose a CSV file</em> below.`;
    showError("Could not load CSV", msg, String(e && e.message ? e.message : e), help);
  }
}

// ============================================================================
// WIRE UP — file picker, drag & drop, error buttons, init
// ============================================================================
document.getElementById("file-input").addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const text = await loadFromFile(file);
    processText(text, file.name);
  } catch (err) {
    showError("Could not read file", String(err && err.message ? err.message : err));
  } finally {
    e.target.value = ""; // allow picking the same file again
  }
});

document.getElementById("error-pick").onclick  = () => document.getElementById("file-input").click();
document.getElementById("error-retry").onclick = () => tryLoadDefault();

// Drag and drop anywhere on the page
let dragDepth = 0;
window.addEventListener("dragenter", (e) => {
  if (!e.dataTransfer || ![...e.dataTransfer.types].includes("Files")) return;
  e.preventDefault();
  dragDepth++;
  document.body.classList.add("drag-over");
});
window.addEventListener("dragleave", (e) => {
  dragDepth = Math.max(0, dragDepth - 1);
  if (dragDepth === 0) document.body.classList.remove("drag-over");
});
window.addEventListener("dragover", (e) => {
  if (e.dataTransfer && [...e.dataTransfer.types].includes("Files")) {
    e.preventDefault();
    e.dataTransfer.dropEffect = "copy";
  }
});
window.addEventListener("drop", async (e) => {
  e.preventDefault();
  dragDepth = 0;
  document.body.classList.remove("drag-over");
  const file = e.dataTransfer && e.dataTransfer.files[0];
  if (!file) return;
  try {
    const text = await loadFromFile(file);
    processText(text, file.name);
  } catch (err) {
    showError("Could not read dropped file", String(err && err.message ? err.message : err));
  }
});

// Init
tryLoadDefault();
</script>
