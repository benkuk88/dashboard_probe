<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Feature × Probe data collection — pipeline status</title>
<style>
  :root {
    --bg: #0e0f12;
    --bg-elev: #161821;
    --bg-card: #1a1d27;
    --fill-tertiary: #232734;
    --stroke-tertiary: #2c3142;
    --stroke: #3a4055;
    --text-primary: #e6e8ee;
    --text-secondary: #a4abbd;
    --text-tertiary: #6b7388;
    --accent-primary: #4f8cff;
    --accent-info: #4f8cff;
    --accent-success: #2ecc71;
    --accent-warning: #f5b942;
    --accent-danger: #ef4646;
    --accent-neutral: #6b7388;
    --accent-info-soft: rgba(79, 140, 255, 0.12);
    --accent-success-soft: rgba(46, 204, 113, 0.13);
    --accent-warning-soft: rgba(245, 185, 66, 0.13);
    --accent-danger-soft: rgba(239, 70, 70, 0.13);
    --accent-neutral-soft: rgba(107, 115, 136, 0.18);
    --radius: 10px;
  }

  * { box-sizing: border-box; }
  /* The `hidden` HTML attribute must always win, even on elements whose
     author CSS sets a non-default `display` (e.g. .state-card uses flex). */
  [hidden] { display: none !important; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter",
      "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 14px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  code, .mono {
    font-family: "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    font-size: 0.9em;
    background: var(--fill-tertiary);
    padding: 1px 6px;
    border-radius: 4px;
    color: var(--text-primary);
  }
  h1, h2, h3 { margin: 0; font-weight: 600; letter-spacing: -0.01em; }
  h1 { font-size: 28px; line-height: 1.2; }
  h2 { font-size: 20px; line-height: 1.3; }
  h3 { font-size: 16px; line-height: 1.3; }
  p { margin: 0; }
  .secondary { color: var(--text-secondary); }
  .tertiary { color: var(--text-tertiary); font-size: 12px; }
  .small { font-size: 12px; }
  .semibold { font-weight: 600; }

  .container {
    max-width: 1180px;
    margin: 0 auto;
    padding: 32px 24px 64px;
    display: flex; flex-direction: column;
    gap: 28px;
  }

  .meta-row {
    display: flex; justify-content: space-between; align-items: center;
    gap: 12px; flex-wrap: wrap;
  }
  .header-block { display: flex; flex-direction: column; gap: 8px; }

  .grid-4 {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }
  .grid-3 {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }
  .grid-2-1 {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 20px;
  }
  @media (max-width: 900px) {
    .grid-4, .grid-3, .grid-2-1 { grid-template-columns: 1fr; }
  }

  .stat {
    background: var(--bg-card);
    border: 1px solid var(--stroke-tertiary);
    border-radius: var(--radius);
    padding: 16px 18px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .stat .value {
    font-size: 26px; font-weight: 600; letter-spacing: -0.02em;
  }
  .stat .label { color: var(--text-secondary); font-size: 12.5px; }
  .stat.info  .value { color: var(--accent-info); }
  .stat.success .value { color: var(--accent-success); }
  .stat.warning .value { color: var(--accent-warning); }
  .stat.danger  .value { color: var(--accent-danger); }

  .hero {
    display: flex; flex-direction: column; gap: 10px;
    background: var(--bg-card);
    border: 1px solid var(--stroke-tertiary);
    border-radius: var(--radius);
    padding: 18px 20px;
  }
  .hero .top {
    display: flex; justify-content: space-between; align-items: center;
    gap: 12px; flex-wrap: wrap;
  }
  .progress-track {
    position: relative; width: 100%;
    height: 14px; background: var(--fill-tertiary);
    border-radius: 7px; overflow: hidden;
  }
  .progress-fill {
    position: absolute; inset: 0; border-radius: 7px;
  }
  .legend {
    display: flex; gap: 18px; flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .swatch {
    display: inline-block; width: 10px; height: 10px;
    border-radius: 2px;
  }
  .swatch.outline { border: 1px solid var(--stroke-tertiary); }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--stroke-tertiary);
    border-radius: var(--radius);
    overflow: hidden;
    display: flex; flex-direction: column;
  }
  .card-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--stroke-tertiary);
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px;
    font-weight: 600;
    background: rgba(255, 255, 255, 0.015);
  }
  .card-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 8px; }

  .pill {
    display: inline-flex; align-items: center;
    padding: 2px 9px;
    font-size: 11.5px; line-height: 18px;
    border-radius: 999px;
    border: 1px solid transparent;
    background: var(--accent-neutral-soft);
    color: var(--text-primary);
    white-space: nowrap;
  }
  .pill.info    { background: var(--accent-info-soft);    color: #9ec0ff; border-color: rgba(79,140,255,0.3); }
  .pill.success { background: var(--accent-success-soft); color: #6ee5a3; border-color: rgba(46,204,113,0.3); }
  .pill.warning { background: var(--accent-warning-soft); color: #ffd07a; border-color: rgba(245,185,66,0.3); }
  .pill.danger  { background: var(--accent-danger-soft);  color: #ff8c8c; border-color: rgba(239,70,70,0.3); }
  .pill.neutral { background: var(--accent-neutral-soft); color: var(--text-secondary); border-color: rgba(107,115,136,0.3); }

  .pill-row { display: flex; gap: 6px; flex-wrap: wrap; }

  .callout {
    border-radius: var(--radius);
    border: 1px solid;
    padding: 14px 16px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .callout .title { font-weight: 600; }
  .callout.info    { background: var(--accent-info-soft);    border-color: rgba(79,140,255,0.35);   color: var(--text-primary); }
  .callout.success { background: var(--accent-success-soft); border-color: rgba(46,204,113,0.35);  color: var(--text-primary); }
  .callout.warning { background: var(--accent-warning-soft); border-color: rgba(245,185,66,0.35);  color: var(--text-primary); }
  .callout.danger  { background: var(--accent-danger-soft);  border-color: rgba(239,70,70,0.35);   color: var(--text-primary); }

  .table-wrap {
    background: var(--bg-card);
    border: 1px solid var(--stroke-tertiary);
    border-radius: var(--radius);
    overflow: hidden;
  }
  table {
    width: 100%; border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    text-align: left;
    font-weight: 600;
    color: var(--text-secondary);
    font-size: 12px;
    text-transform: uppercase; letter-spacing: 0.04em;
    padding: 12px 14px;
    border-bottom: 1px solid var(--stroke-tertiary);
    background: rgba(255,255,255,0.018);
    white-space: nowrap;
  }
  tbody td {
    padding: 11px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    vertical-align: middle;
  }
  tbody tr:nth-child(odd) td { background: rgba(255,255,255,0.012); }
  tbody tr:last-child td { border-bottom: none; }
  th.right, td.right { text-align: right; }
  th.left,  td.left  { text-align: left; }

  .chart-card {
    background: var(--bg-card);
    border: 1px solid var(--stroke-tertiary);
    border-radius: var(--radius);
    padding: 18px 20px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .chart-svg { width: 100%; display: block; }
  .chart-label { font-size: 12px; fill: var(--text-secondary); }
  .chart-value { font-size: 11px; fill: var(--text-primary); font-weight: 600; }
  .chart-axis { stroke: var(--stroke-tertiary); }

  .divider {
    height: 1px; width: 100%;
    background: var(--stroke-tertiary);
    border: none;
  }
  /* #app holds all the sections injected by renderDashboard. Without its
     own flex+gap, the container's `gap: 28px` only applies between #loader,
     #error and #app — not between the sections inside #app, which would
     stack with no breathing room. */
  #app { display: flex; flex-direction: column; gap: 28px; }
  .section { display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .row.between { justify-content: space-between; }
  .stack { display: flex; flex-direction: column; gap: 6px; }

  /* === Buttons & toolbar === */
  .btn {
    cursor: pointer;
    background: var(--bg-card);
    color: var(--text-primary);
    border: 1px solid var(--stroke-tertiary);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 12.5px; font-weight: 500;
    font-family: inherit;
  }
  .btn:hover { border-color: var(--accent-primary); color: var(--accent-primary); }
  .btn.primary {
    background: var(--accent-primary);
    color: white;
    border-color: var(--accent-primary);
  }
  .btn.primary:hover { background: #6ea1ff; color: white; }

  .toolbar {
    display: flex; justify-content: space-between; align-items: center;
    gap: 16px; flex-wrap: wrap;
    background: var(--bg-card);
    border: 1px solid var(--stroke-tertiary);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 12.5px;
  }
  .toolbar-info { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; color: var(--text-secondary); }
  .toolbar-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  /* === Loader / error states === */
  .state-card {
    background: var(--bg-card);
    border: 1px solid var(--stroke-tertiary);
    border-radius: var(--radius);
    padding: 28px 32px;
    display: flex; flex-direction: column; gap: 14px;
    margin: 80px auto 0;
    max-width: 720px;
  }
  .state-card h2 { font-size: 18px; }
  .state-card.error { border-color: rgba(239,70,70,0.35); background: rgba(239,70,70,0.06); }
  .state-card .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
  .state-card pre {
    margin: 0; padding: 10px 12px;
    background: var(--bg);
    border: 1px solid var(--stroke-tertiary);
    border-radius: 6px;
    font-size: 12px;
    color: var(--text-secondary);
    overflow-x: auto;
    white-space: pre-wrap; word-break: break-word;
  }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--stroke-tertiary);
    border-top-color: var(--accent-primary);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
    vertical-align: -4px; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* === Drag-and-drop overlay === */
  body.drag-over::after {
    content: "Drop the CSV file to load it";
    position: fixed; inset: 0;
    background: rgba(79,140,255,0.18);
    border: 3px dashed var(--accent-primary);
    color: var(--text-primary);
    font-size: 22px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    z-index: 1000;
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="container">
  <div id="loader" class="state-card">
    <div><span class="spinner"></span><span class="semibold">Loading dashboard...</span></div>
    <div class="secondary small">Reading <code class="mono" id="loader-path">data/dashboard_feature_probe_source.csv</code></div>
  </div>

  <div id="error" class="state-card error" hidden>
    <h2 id="error-title">Could not load CSV</h2>
    <div class="secondary" id="error-msg"></div>
    <pre id="error-detail" hidden></pre>
    <div class="secondary small" id="error-help"></div>
    <div class="actions">
      <button class="btn primary" id="error-pick">Choose a CSV file...</button>
      <button class="btn" id="error-retry">Retry default location</button>
    </div>
  </div>

  <div id="app" hidden></div>
</div>

<input type="file" id="file-input" accept=".csv,text/csv" hidden />

<script>
// ============================================================================
// CONSTANTS
// ============================================================================
const DEFAULT_CSV_PATH = 'data/dashboard_feature_probe_source.csv';

// CSV column indices — must match scripts/regenerate_canvas.py historically.
const COL_FEATURE              = 0;
const COL_SOURCE               = 1;
const COL_PROBE                = 2;
const COL_REQUIRED             = 4;
const COL_COLLECTED            = 5;
const COL_PENDING_MULTIFRAME   = 7;
const COL_PENDING_CURATION     = 9;
const COL_PASS_CURATION        = 10;
const COL_FAIL_CURATION        = 11;
const COL_PENDING_ANNOTATIONS  = 13;
const COL_COMPLETE_ANNOTATIONS = 14;
const COL_PENDING_REVIEW       = 15;
const COL_FRAMES_PASS_REVIEW   = 16;
const COL_FRAMES_FAIL_REVIEW   = 17;

// ============================================================================
// CSV PARSER — RFC 4180-ish, handles quoted fields with embedded commas,
// double-quote escaping ("") and CRLF / LF / CR line endings.
// ============================================================================
function parseCSV(text) {
  // Strip UTF-8 BOM if present.
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);

  const rows = [];
  let row = [];
  let cell = '';
  let inQuotes = false;
  let i = 0;
  const n = text.length;

  while (i < n) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') {
        if (text[i + 1] === '"') { cell += '"'; i += 2; continue; }
        inQuotes = false; i++; continue;
      }
      cell += c; i++; continue;
    }
    if (c === '"') { inQuotes = true; i++; continue; }
    if (c === ',') { row.push(cell); cell = ''; i++; continue; }
    if (c === '\r' || c === '\n') {
      row.push(cell); rows.push(row);
      cell = ''; row = [];
      if (c === '\r' && text[i + 1] === '\n') i += 2; else i++;
      continue;
    }
    cell += c; i++;
  }
  if (cell !== '' || row.length > 0) { row.push(cell); rows.push(row); }
  return rows;
}

// ============================================================================
// AGGREGATOR — port of parse_csv() from scripts/regenerate_canvas.py
// ============================================================================
function toInt(v) {
  if (v == null) return 0;
  const s = String(v).trim();
  if (!s) return 0;
  const n = parseFloat(s);
  return Number.isFinite(n) ? Math.trunc(n) : 0;
}
function cell(row, idx) { return idx < row.length ? row[idx] : ''; }

function aggregateFromCSV(rows) {
  const features = new Map();
  const featureOrder = [];
  const probes = [];
  const seenProbes = new Set();

  // First two rows are the grouped + column-name headers.
  for (let r = 2; r < rows.length; r++) {
    const row = rows[r];
    const feature = String(cell(row, COL_FEATURE)).trim();
    const source  = String(cell(row, COL_SOURCE)).trim();
    const probe   = String(cell(row, COL_PROBE)).trim();
    if (!feature) continue;
    // Subtotal rows leave source/probe empty — same filter as the Python.
    if (!source || !probe) continue;

    let agg = features.get(feature);
    if (!agg) {
      agg = {
        name: feature,
        required: 0, collected: 0, pendingMultiframe: 0,
        pendingCuration: 0, passCuration: 0, failCuration: 0,
        pendingAnnotations: 0, completeAnnotations: 0,
        pendingReview: 0, framesPassReview: 0, framesFailReview: 0,
        sources: new Set(),
      };
      features.set(feature, agg);
      featureOrder.push(feature);
    }
    agg.required             += toInt(cell(row, COL_REQUIRED));
    agg.collected            += toInt(cell(row, COL_COLLECTED));
    agg.pendingMultiframe    += toInt(cell(row, COL_PENDING_MULTIFRAME));
    agg.pendingCuration      += toInt(cell(row, COL_PENDING_CURATION));
    agg.passCuration         += toInt(cell(row, COL_PASS_CURATION));
    agg.failCuration         += toInt(cell(row, COL_FAIL_CURATION));
    agg.pendingAnnotations   += toInt(cell(row, COL_PENDING_ANNOTATIONS));
    agg.completeAnnotations  += toInt(cell(row, COL_COMPLETE_ANNOTATIONS));
    agg.pendingReview        += toInt(cell(row, COL_PENDING_REVIEW));
    agg.framesPassReview     += toInt(cell(row, COL_FRAMES_PASS_REVIEW));
    agg.framesFailReview     += toInt(cell(row, COL_FRAMES_FAIL_REVIEW));
    agg.sources.add(source);

    if (!seenProbes.has(probe)) { seenProbes.add(probe); probes.push(probe); }
  }

  const featureList = featureOrder.map((name) => {
    const agg = features.get(name);
    const hasInternal = agg.sources.has('internal');
    const hasExternal = agg.sources.has('external');
    let sourceCoverage = 'internal-only';
    if (hasInternal && hasExternal) sourceCoverage = 'both';
    else if (hasExternal && !hasInternal) sourceCoverage = 'external-only';
    return { ...agg, sourceCoverage };
  });
  // Match Python: sort by -collected, -required, name asc
  featureList.sort((a, b) => {
    if (b.collected !== a.collected) return b.collected - a.collected;
    if (b.required  !== a.required)  return b.required  - a.required;
    return a.name.localeCompare(b.name);
  });

  return { features: featureList, probes };
}

// ============================================================================
// HELPERS
// ============================================================================
const sum = (arr, key) => arr.reduce((s, x) => s + x[key], 0);
const pctOf = (part, whole) => whole === 0 ? 0 : Math.round((part / whole) * 100);

function escapeXml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&apos;",
  }[c]));
}

function el(tag, attrs = {}, ...children) {
  const node = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === "class") node.className = v;
    else if (k === "html") node.innerHTML = v;
    else if (k === "style") node.setAttribute("style", v);
    else if (k === "hidden") { if (v) node.setAttribute("hidden", ""); }
    else node.setAttribute(k, v);
  }
  for (const c of children) {
    if (c == null) continue;
    if (typeof c === "string") node.appendChild(document.createTextNode(c));
    else node.appendChild(c);
  }
  return node;
}

function pillHTML(text, tone = "neutral") {
  return `<span class="pill ${tone}">${escapeXml(text)}</span>`;
}
function statCard(value, label, tone = "") {
  return el("div", { class: `stat ${tone}` },
    el("div", { class: "value" }, value),
    el("div", { class: "label" }, label),
  );
}
function callout(tone, title, bodyHTML) {
  const c = el("div", { class: `callout ${tone}` });
  c.appendChild(el("div", { class: "title" }, title));
  c.appendChild(el("div", { class: "secondary small", html: bodyHTML }));
  return c;
}
function statusFor(f) {
  if (f.collected === 0) return { label: "Not started", tone: "danger" };
  const pct = pctOf(f.collected, f.required);
  if (pct >= 80) return { label: "On track", tone: "success" };
  if (pct >= 40) return { label: "In progress", tone: "warning" };
  return { label: "Lagging", tone: "danger" };
}
function sourcePill(coverage) {
  if (coverage === "internal-only") return pillHTML("internal", "info");
  if (coverage === "external-only") return pillHTML("external", "warning");
  return pillHTML("internal + external", "neutral");
}

// ============================================================================
// CHARTS
// ============================================================================
const CHART_COLORS = {
  success: "#2ecc71",
  warning: "#f5b942",
  danger:  "#ef4646",
  info:    "#4f8cff",
  neutral: "#3a4055",
};

function horizontalBarChart(categories, series, opts = {}) {
  const stacked    = opts.stacked ?? false;
  const rowHeight  = 26;
  const rowGap     = 8;
  const padTop     = 28;
  const padBottom  = 28;
  const padLeft    = 130;
  const padRight   = 60;
  const innerWidth = 760;
  const totalWidth = innerWidth + padLeft + padRight;
  const totalHeight = padTop + padBottom + categories.length * (rowHeight + rowGap) - rowGap;

  let scaleMax = 0;
  for (let i = 0; i < categories.length; i++) {
    let rowSum = 0;
    for (const s of series) {
      if (stacked) rowSum += s.data[i];
      else rowSum = Math.max(rowSum, s.data[i]);
    }
    scaleMax = Math.max(scaleMax, rowSum);
  }
  if (scaleMax === 0) scaleMax = 1;
  function niceCeil(n) {
    if (n <= 10) return Math.ceil(n);
    const pow = Math.pow(10, Math.floor(Math.log10(n)));
    return Math.ceil(n / pow) * pow;
  }
  const axisMax = niceCeil(scaleMax);
  const xToPx = (v) => padLeft + (v / axisMax) * innerWidth;

  const ticks = 4;
  const tickValues = [];
  for (let t = 0; t <= ticks; t++) tickValues.push(Math.round(axisMax * t / ticks));

  let svg = `<svg viewBox="0 0 ${totalWidth} ${totalHeight}" class="chart-svg" preserveAspectRatio="xMidYMid meet">`;
  for (const t of tickValues) {
    const x = xToPx(t);
    svg += `<line x1="${x}" y1="${padTop - 6}" x2="${x}" y2="${totalHeight - padBottom + 6}" stroke="var(--stroke-tertiary)" stroke-dasharray="2 3" stroke-width="1"/>`;
    svg += `<text x="${x}" y="${padTop - 10}" text-anchor="middle" class="chart-label">${t}</text>`;
  }
  for (let i = 0; i < categories.length; i++) {
    const rowY = padTop + i * (rowHeight + rowGap);
    svg += `<text x="${padLeft - 10}" y="${rowY + rowHeight / 2 + 4}" text-anchor="end" class="chart-label">${escapeXml(categories[i])}</text>`;
    if (stacked) {
      let cursorX = padLeft;
      let totalRow = 0;
      for (const s of series) {
        const w = (s.data[i] / axisMax) * innerWidth;
        if (w > 0) {
          svg += `<rect x="${cursorX}" y="${rowY}" width="${w}" height="${rowHeight}" fill="${CHART_COLORS[s.tone] || CHART_COLORS.info}" rx="3"/>`;
          if (s.data[i] > 0 && w > 22) {
            svg += `<text x="${cursorX + w / 2}" y="${rowY + rowHeight / 2 + 4}" text-anchor="middle" class="chart-value">${s.data[i]}</text>`;
          }
        }
        cursorX += w;
        totalRow += s.data[i];
      }
      svg += `<text x="${cursorX + 6}" y="${rowY + rowHeight / 2 + 4}" text-anchor="start" class="chart-label">${totalRow}</text>`;
    } else {
      const v = series[0].data[i];
      const w = (v / axisMax) * innerWidth;
      svg += `<rect x="${padLeft}" y="${rowY}" width="${w}" height="${rowHeight}" fill="${CHART_COLORS[series[0].tone] || CHART_COLORS.info}" rx="3"/>`;
      svg += `<text x="${padLeft + w + 6}" y="${rowY + rowHeight / 2 + 4}" text-anchor="start" class="chart-value">${v}</text>`;
    }
  }
  svg += `<line x1="${padLeft}" y1="${totalHeight - padBottom + 4}" x2="${padLeft + innerWidth}" y2="${totalHeight - padBottom + 4}" stroke="var(--stroke-tertiary)" stroke-width="1"/>`;
  svg += `</svg>`;

  let legend = "";
  if (series.length > 1 || stacked) {
    legend = `<div class="legend">`;
    for (const s of series) {
      legend += `<div class="legend-item"><span class="swatch" style="background:${CHART_COLORS[s.tone] || CHART_COLORS.info}"></span><span class="small secondary">${escapeXml(s.name)}</span></div>`;
    }
    legend += `</div>`;
  }
  return svg + legend;
}

function donutChart(data) {
  const size  = 220;
  const cx    = size / 2;
  const cy    = size / 2;
  const r     = 80;
  const inner = 50;
  const total = data.reduce((s, d) => s + d.value, 0) || 1;

  let angle = -Math.PI / 2;
  let svg = `<svg viewBox="0 0 ${size} ${size}" class="chart-svg" style="max-width: 240px; margin: 0 auto;">`;
  for (const slice of data) {
    if (slice.value <= 0) continue;
    const frac = slice.value / total;
    const next = angle + frac * Math.PI * 2;
    const x1 = cx + r * Math.cos(angle), y1 = cy + r * Math.sin(angle);
    const x2 = cx + r * Math.cos(next),  y2 = cy + r * Math.sin(next);
    const x3 = cx + inner * Math.cos(next),  y3 = cy + inner * Math.sin(next);
    const x4 = cx + inner * Math.cos(angle), y4 = cy + inner * Math.sin(angle);
    const large = (next - angle) > Math.PI ? 1 : 0;
    const path = `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} L ${x3} ${y3} A ${inner} ${inner} 0 ${large} 0 ${x4} ${y4} Z`;
    const color = CHART_COLORS[slice.tone] || CHART_COLORS.info;
    svg += `<path d="${path}" fill="${color}" stroke="var(--bg-card)" stroke-width="2"/>`;
    angle = next;
  }
  svg += `<text x="${cx}" y="${cy - 4}" text-anchor="middle" font-size="22" font-weight="600" fill="var(--text-primary)">${total}</text>`;
  svg += `<text x="${cx}" y="${cy + 14}" text-anchor="middle" font-size="11" fill="var(--text-secondary)">total</text>`;
  svg += `</svg>`;

  let legend = `<div class="legend" style="justify-content:center; margin-top:8px">`;
  for (const slice of data) {
    const pct = Math.round(slice.value / total * 100);
    legend += `<div class="legend-item">
      <span class="swatch" style="background:${CHART_COLORS[slice.tone] || CHART_COLORS.info}"></span>
      <span class="small secondary">${escapeXml(slice.label)}: <span style="color:var(--text-primary); font-weight:600">${slice.value}</span> (${pct}%)</span>
    </div>`;
  }
  legend += `</div>`;
  return svg + legend;
}

function formatLoadedAt(d) {
  return d.toLocaleString(undefined, {
    year: "numeric", month: "short", day: "2-digit",
    hour: "2-digit", minute: "2-digit",
  });
}

// ============================================================================
// MAIN RENDER — takes parsed state and (re)builds the dashboard.
// ============================================================================
function renderDashboard(state) {
  const { features, probes, sourceLabel, loadedAt } = state;

  const TOTAL_REQUIRED             = sum(features, "required");
  const TOTAL_COLLECTED            = sum(features, "collected");
  const TOTAL_PASS                 = sum(features, "passCuration");
  const TOTAL_FAIL                 = sum(features, "failCuration");
  const TOTAL_PENDING_CURATION     = sum(features, "pendingCuration");
  const TOTAL_PENDING_ANNOTATIONS  = sum(features, "pendingAnnotations");
  const TOTAL_COMPLETE_ANNOTATIONS = sum(features, "completeAnnotations");
  const TOTAL_PENDING_REVIEW       = sum(features, "pendingReview");
  const TOTAL_FRAMES_PASS          = sum(features, "framesPassReview");
  const TOTAL_FRAMES_FAIL          = sum(features, "framesFailReview");

  const PHASE_3_HAS_DATA = TOTAL_PENDING_ANNOTATIONS + TOTAL_COMPLETE_ANNOTATIONS > 0;
  const PHASE_4_HAS_DATA = TOTAL_PENDING_REVIEW + TOTAL_FRAMES_PASS + TOTAL_FRAMES_FAIL > 0;

  const OVERALL_PCT = TOTAL_REQUIRED ? Math.round((TOTAL_COLLECTED / TOTAL_REQUIRED) * 100) : 0;
  const PASS_RATE   = TOTAL_PASS + TOTAL_FAIL > 0 ? Math.round((TOTAL_PASS / (TOTAL_PASS + TOTAL_FAIL)) * 100) : 0;
  const GAP         = TOTAL_REQUIRED - TOTAL_COLLECTED;

  const externalOnlyFeatures = features.filter((f) => f.sourceCoverage === "external-only");
  const internalOnlyFeatures = features.filter((f) => f.sourceCoverage === "internal-only");
  const bothFeatures         = features.filter((f) => f.sourceCoverage === "both");
  const externalOnlyRequired = sum(externalOnlyFeatures, "required");
  const bothRequired         = sum(bothFeatures, "required");

  const onTrack    = features.filter((f) => pctOf(f.collected, f.required) >= 80);
  const lagging    = features.filter((f) => f.collected > 0 && pctOf(f.collected, f.required) < 40);
  const notStarted = features.filter((f) => f.collected === 0);

  const app = document.getElementById("app");
  app.innerHTML = "";

  // Toolbar
  const toolbar = el("div", { class: "toolbar" });
  toolbar.innerHTML = `
    <div class="toolbar-info">
      <span><span class="tertiary">Source:</span> <code class="mono">${escapeXml(sourceLabel)}</code></span>
      <span><span class="tertiary">Loaded:</span> ${formatLoadedAt(loadedAt)}</span>
      <span><span class="tertiary">Rows:</span> ${features.length} features · ${probes.length} probes</span>
    </div>
    <div class="toolbar-actions">
      <button class="btn" id="toolbar-reload">Reload from disk</button>
      <button class="btn" id="toolbar-pick">Load other CSV...</button>
    </div>
  `;
  app.appendChild(toolbar);

  // Header
  const header = el("div", { class: "header-block" });
  header.innerHTML = `
    <div class="meta-row">
      <span class="tertiary semibold"><code class="mono">${escapeXml(sourceLabel)}</code> · Chameleon system</span>
      <span class="tertiary">Loaded: ${formatLoadedAt(loadedAt)}</span>
    </div>
    <h1>Feature × Probe data collection — pipeline status</h1>
    <p class="secondary">
      Per-row tracking of patient data acquisition for ${features.length} clinical
      ultrasound features across ${probes.length} probe models, split by
      internal / external source.
    </p>
  `;
  app.appendChild(header);

  // Stats
  const statRow = el("div", { class: "grid-4" });
  statRow.appendChild(statCard(TOTAL_REQUIRED.toLocaleString(), "Patients required (target)"));
  statRow.appendChild(statCard(TOTAL_COLLECTED.toLocaleString(), `Collected (${OVERALL_PCT}%)`, "info"));
  statRow.appendChild(statCard(TOTAL_PASS.toLocaleString(), `Passed curation (${pctOf(TOTAL_PASS, TOTAL_REQUIRED)}%)`, "success"));
  statRow.appendChild(statCard(GAP.toLocaleString(), "Gap to target", "warning"));
  app.appendChild(statRow);

  // Hero progress
  const collectedPct = TOTAL_REQUIRED ? (TOTAL_COLLECTED / TOTAL_REQUIRED) * 100 : 0;
  const passedPct    = TOTAL_REQUIRED ? (TOTAL_PASS / TOTAL_REQUIRED) * 100 : 0;
  const hero = el("div", { class: "hero" });
  hero.innerHTML = `
    <div class="top">
      <span class="semibold">Collection progress against full target</span>
      <span class="tertiary">${TOTAL_COLLECTED} collected · ${TOTAL_PASS} passed curation · ${GAP} still missing</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" style="width:${collectedPct}%; background:var(--accent-primary)"></div>
      <div class="progress-fill" style="width:${passedPct}%;    background:var(--accent-success)"></div>
    </div>
    <div class="legend">
      <div class="legend-item"><span class="swatch" style="background:var(--accent-success)"></span><span class="small secondary">Passed curation (${pctOf(TOTAL_PASS, TOTAL_REQUIRED)}%)</span></div>
      <div class="legend-item"><span class="swatch" style="background:var(--accent-primary)"></span><span class="small secondary">Collected (${OVERALL_PCT}%)</span></div>
      <div class="legend-item"><span class="swatch outline" style="background:var(--fill-tertiary)"></span><span class="small secondary">Remaining (${100 - OVERALL_PCT}%)</span></div>
    </div>
  `;
  app.appendChild(hero);

  // What this file describes
  const whatSection = el("div", { class: "section" });
  whatSection.innerHTML = `
    <h2>What this file describes</h2>
    <p class="secondary">
      Each detail row is a unique combination of a clinical <span class="semibold">feature</span>
      (e.g. <code class="mono">bladder</code>, <code class="mono">vti</code>, <code class="mono">cnerve</code>),
      a <span class="semibold">probe model</span> (transducer such as
      <code class="mono">15C</code>, <code class="mono">L420t</code>, <code class="mono">Air12L</code>),
      and a <span class="semibold">source group</span>
      (<code class="mono">internal</code> vs <code class="mono">external</code>).
      All rows target the <code class="mono">Chameleon</code> imaging system.
      Subtotal rows ending in &ldquo;total&rdquo; aggregate per feature.
    </p>
    <div class="grid-4">
      <div class="card">
        <div class="card-header">Phase 1 — Collection</div>
        <div class="card-body">
          <span class="small secondary">How many patients were physically acquired and queued for multiframe extraction.</span>
          <code class="mono">patients_collected</code>
          <code class="mono">patients_pending_multiframe</code>
          <code class="mono">…_not_collected</code>
        </div>
      </div>
      <div class="card">
        <div class="card-header">Phase 2 — Curation</div>
        <div class="card-body">
          <span class="small secondary">Quality screening: each collected patient passes or fails curation.</span>
          <code class="mono">patients_pending_curation</code>
          <code class="mono">patients_pass_curation</code>
          <code class="mono">patients_failed_curation</code>
        </div>
      </div>
      <div class="card">
        <div class="card-header">Phase 3 — Annotation</div>
        <div class="card-body">
          <span class="small secondary">Frame-level labelling of curated cases.</span>
          <code class="mono">pending_annotations</code>
          <code class="mono">Complete_annotations</code>
        </div>
      </div>
      <div class="card">
        <div class="card-header">Phase 4 — Frame review</div>
        <div class="card-body">
          <span class="small secondary">Reviewer sign-off on annotated frames.</span>
          <code class="mono">Pending Review</code>
          <code class="mono">Frames_pass_Review</code>
          <code class="mono">Frames_failed_Review</code>
        </div>
      </div>
    </div>
  `;
  app.appendChild(whatSection);

  app.appendChild(el("hr", { class: "divider" }));

  // Per-feature progress table
  const tableSection = el("div", { class: "section" });
  tableSection.innerHTML = `
    <h2>Per-feature progress</h2>
    <p class="secondary">Sorted by patients collected. Status is based on collection percentage of the per-feature target.</p>
  `;
  const sortedByCollected = [...features].sort((a, b) => b.collected - a.collected);
  let tableHTML = `
    <div class="table-wrap"><table>
      <thead><tr>
        <th class="left">Feature</th>
        <th class="left">Source coverage</th>
        <th class="right">Required</th>
        <th class="right">Collected</th>
        <th class="right">% complete</th>
        <th class="right">In curation</th>
        <th class="right">Pass</th>
        <th class="right">Fail</th>
        <th class="left">Status</th>
      </tr></thead>
      <tbody>`;
  for (const f of sortedByCollected) {
    const pct = pctOf(f.collected, f.required);
    const status = statusFor(f);
    tableHTML += `<tr>
      <td class="left semibold">${escapeXml(f.name)}</td>
      <td class="left">${sourcePill(f.sourceCoverage)}</td>
      <td class="right">${f.required}</td>
      <td class="right">${f.collected}</td>
      <td class="right">${pct}%</td>
      <td class="right">${f.pendingCuration}</td>
      <td class="right">${f.passCuration}</td>
      <td class="right">${f.failCuration}</td>
      <td class="left">${pillHTML(status.label, status.tone)}</td>
    </tr>`;
  }
  tableHTML += `</tbody></table></div>`;
  const tableWrap = el("div");
  tableWrap.innerHTML = tableHTML;
  tableSection.appendChild(tableWrap);
  app.appendChild(tableSection);

  // Two-column charts
  const chartsRow = el("div", { class: "grid-2-1" });
  const sortedByPct = [...features].sort((a, b) => pctOf(b.collected, b.required) - pctOf(a.collected, a.required));

  const colCollection = el("div", { class: "chart-card" });
  colCollection.innerHTML = `
    <h3>Collection vs gap, per feature</h3>
    ${horizontalBarChart(
      sortedByPct.map((f) => f.name),
      [
        { name: "Collected",            data: sortedByPct.map((f) => f.collected), tone: "success" },
        { name: "Remaining vs target",  data: sortedByPct.map((f) => Math.max(f.required - f.collected, 0)), tone: "neutral" },
      ],
      { stacked: true }
    )}
  `;
  chartsRow.appendChild(colCollection);

  const colDonut = el("div", { class: "chart-card" });
  colDonut.innerHTML = `
    <h3>Curation outcomes</h3>
    ${donutChart([
      { label: "Passed",          value: TOTAL_PASS,             tone: "success" },
      { label: "Failed",          value: TOTAL_FAIL,             tone: "danger"  },
      { label: "Pending curation", value: TOTAL_PENDING_CURATION, tone: "warning" },
    ])}
    <p class="small secondary" style="margin-top:6px">
      Of the ${TOTAL_PASS + TOTAL_FAIL} patients fully curated so far,
      ${PASS_RATE}% passed. Another ${TOTAL_PENDING_CURATION} are still waiting to be curated.
    </p>
  `;
  chartsRow.appendChild(colDonut);
  app.appendChild(chartsRow);

  // Funnel
  const funnelSection = el("div", { class: "section" });
  funnelSection.innerHTML = `
    <h2>Patient-level pipeline funnel</h2>
    <p class="secondary">Snapshot of where collected patients currently sit in the pipeline.</p>
    <div class="chart-card">
      ${horizontalBarChart(
        ["Required", "Collected", "Pending curation", "Passed curation", "Failed curation"],
        [{ name: "Patients", data: [TOTAL_REQUIRED, TOTAL_COLLECTED, TOTAL_PENDING_CURATION, TOTAL_PASS, TOTAL_FAIL], tone: "info" }],
        { stacked: false }
      )}
    </div>
  `;
  app.appendChild(funnelSection);

  app.appendChild(el("hr", { class: "divider" }));

  // Phase 3 & 4
  if (!PHASE_3_HAS_DATA && !PHASE_4_HAS_DATA) {
    app.appendChild(callout(
      "warning",
      "Phases 3 & 4 are not active yet",
      `The columns for <code class="mono">pending_annotations</code>,
       <code class="mono">Complete_annotations</code>,
       <code class="mono">Pending Review</code>,
       <code class="mono">Frames_pass_Review</code> and
       <code class="mono">Frames_failed_Review</code> contain no values in the source CSV.
       The pipeline has not yet produced any annotated or reviewed frames —
       work to date is patient-level only (Phases 1–2).`
    ));
  } else {
    const phaseSection = el("div", { class: "section" });
    phaseSection.innerHTML = `<h2>Annotation & frame review</h2>`;
    const grid = el("div", { class: "grid-4" });
    grid.appendChild(statCard(TOTAL_PENDING_ANNOTATIONS.toLocaleString(), "Pending annotations", PHASE_3_HAS_DATA ? "warning" : ""));
    grid.appendChild(statCard(TOTAL_COMPLETE_ANNOTATIONS.toLocaleString(), "Annotated frames",   PHASE_3_HAS_DATA ? "success" : ""));
    grid.appendChild(statCard(TOTAL_FRAMES_PASS.toLocaleString(), "Frames passed review",        PHASE_4_HAS_DATA ? "success" : ""));
    grid.appendChild(statCard(TOTAL_FRAMES_FAIL.toLocaleString(), "Frames failed review",        PHASE_4_HAS_DATA ? "danger"  : ""));
    phaseSection.appendChild(grid);

    if (PHASE_3_HAS_DATA) {
      const sortedAnno = [...features].sort((a, b) => b.completeAnnotations - a.completeAnnotations);
      const card = el("div", { class: "chart-card" });
      card.innerHTML = `
        <h3>Annotation progress per feature</h3>
        ${horizontalBarChart(
          sortedAnno.map((f) => f.name),
          [
            { name: "Complete", data: sortedAnno.map((f) => f.completeAnnotations), tone: "success" },
            { name: "Pending",  data: sortedAnno.map((f) => f.pendingAnnotations),  tone: "warning" },
          ],
          { stacked: true }
        )}
      `;
      phaseSection.appendChild(card);
    }

    if (PHASE_4_HAS_DATA) {
      const sortedRev = [...features].sort((a, b) =>
        (b.framesPassReview + b.framesFailReview) - (a.framesPassReview + a.framesFailReview));
      const card = el("div", { class: "chart-card" });
      card.innerHTML = `
        <h3>Frame review outcomes per feature</h3>
        ${horizontalBarChart(
          sortedRev.map((f) => f.name),
          [
            { name: "Pass",    data: sortedRev.map((f) => f.framesPassReview), tone: "success" },
            { name: "Fail",    data: sortedRev.map((f) => f.framesFailReview), tone: "danger"  },
            { name: "Pending", data: sortedRev.map((f) => f.pendingReview),    tone: "warning" },
          ],
          { stacked: true }
        )}
      `;
      phaseSection.appendChild(card);
    }
    app.appendChild(phaseSection);
  }

  app.appendChild(el("hr", { class: "divider" }));

  // Source-group split
  const sourceSection = el("div", { class: "section" });
  sourceSection.innerHTML = `<h2>Source-group split</h2>`;
  if (TOTAL_COLLECTED > 0 && externalOnlyFeatures.every((f) => f.collected === 0)) {
    sourceSection.appendChild(callout(
      "danger",
      "Zero external collection so far",
      `Across every feature that has any external probe rows,
       <span class="semibold">patients_collected = 0</span>.
       All ${TOTAL_COLLECTED} collected patients in the file come from the
       <code class="mono">internal</code> source group.`
    ));
  }
  const sourceGrid = el("div", { class: "grid-3" });
  function sourceCard(title, tone, fs, bodyText) {
    const card = el("div", { class: "card" });
    card.innerHTML = `
      <div class="card-header">
        <span>${escapeXml(title)}</span>
        ${pillHTML(`${fs.length} features`, tone)}
      </div>
      <div class="card-body">
        <span class="small secondary">${bodyText}</span>
        <div class="pill-row">
          ${fs.map((f) => pillHTML(f.name, tone === "info" ? "neutral" : tone)).join("")}
        </div>
      </div>
    `;
    return card;
  }
  sourceGrid.appendChild(sourceCard("internal-only features", "info",
    internalOnlyFeatures, "No external rows exist for these."));
  sourceGrid.appendChild(sourceCard("external-only features", "warning",
    externalOnlyFeatures, `${externalOnlyRequired} required patients across these.`));
  sourceGrid.appendChild(sourceCard("internal + external", "neutral",
    bothFeatures, `${bothRequired} required patients combined.`));
  sourceSection.appendChild(sourceGrid);
  app.appendChild(sourceSection);

  app.appendChild(el("hr", { class: "divider" }));

  // Probe models
  const probesSection = el("div", { class: "section" });
  probesSection.innerHTML = `
    <h2>Probe models in scope</h2>
    <p class="secondary">${probes.length} distinct probe models appear across the rows.</p>
    <div class="pill-row">
      ${probes.map((p) => pillHTML(p, "neutral")).join("")}
    </div>
  `;
  app.appendChild(probesSection);

  app.appendChild(el("hr", { class: "divider" }));

  // Key findings
  const findings = el("div", { class: "section" });
  findings.innerHTML = `<h2>Key findings</h2>`;
  const findingsStack = el("div", { class: "stack", style: "gap: 10px;" });

  findingsStack.appendChild(callout(
    "info",
    `Overall progress sits at ~${OVERALL_PCT}%`,
    `${TOTAL_COLLECTED.toLocaleString()} of ${TOTAL_REQUIRED.toLocaleString()} required patients have been collected.
     ${GAP.toLocaleString()} are still missing before Phase 1 is complete.`
  ));
  if (onTrack.length > 0) {
    findingsStack.appendChild(callout(
      "success",
      `${onTrack.length} feature${onTrack.length === 1 ? "" : "s"} at or above 80%`,
      onTrack.map((f) => `${f.name} (${pctOf(f.collected, f.required)}%)`).join(", ") + "."
    ));
  }
  if (lagging.length > 0) {
    findingsStack.appendChild(callout(
      "warning",
      `${lagging.length} feature${lagging.length === 1 ? "" : "s"} lagging behind`,
      lagging.map((f) => `${f.name} (${pctOf(f.collected, f.required)}%)`).join(", ") + "."
    ));
  }
  if (notStarted.length > 0) {
    findingsStack.appendChild(callout(
      "danger",
      `${notStarted.length} feature${notStarted.length === 1 ? "" : "s"} not started`,
      `${notStarted.map((f) => f.name).join(", ")} — combined target of
       ${notStarted.reduce((s, f) => s + f.required, 0).toLocaleString()} patients.`
    ));
  }
  if (TOTAL_PASS + TOTAL_FAIL > 0) {
    findingsStack.appendChild(callout(
      "success",
      `Curation pass rate: ${PASS_RATE}%`,
      `Of patients fully curated so far, ${PASS_RATE}% pass
       (${TOTAL_PASS} pass vs ${TOTAL_FAIL} fail).`
    ));
  }
  findings.appendChild(findingsStack);
  app.appendChild(findings);

  // Wire up toolbar buttons
  document.getElementById("toolbar-reload").onclick = () => tryLoadDefault();
  document.getElementById("toolbar-pick").onclick   = () => document.getElementById("file-input").click();
}

// ============================================================================
// LOADING + UI STATES
// ============================================================================
function showLoading() {
  document.getElementById("loader").hidden = false;
  document.getElementById("error").hidden = true;
  document.getElementById("app").hidden = true;
}
function showError(title, msg, detail = "", help = "") {
  document.getElementById("loader").hidden = true;
  const errBox = document.getElementById("error");
  errBox.hidden = false;
  document.getElementById("app").hidden = true;
  document.getElementById("error-title").textContent = title;
  document.getElementById("error-msg").textContent = msg;
  const det = document.getElementById("error-detail");
  if (detail) { det.hidden = false; det.textContent = detail; } else { det.hidden = true; }
  document.getElementById("error-help").innerHTML = help;
}
function showApp() {
  document.getElementById("loader").hidden = true;
  document.getElementById("error").hidden = true;
  document.getElementById("app").hidden = false;
}

async function loadFromURL(url) {
  const resp = await fetch(url, { cache: "no-store" });
  if (!resp.ok) throw new Error(`HTTP ${resp.status} ${resp.statusText}`);
  return resp.text();
}
function loadFromFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload  = (e) => resolve(e.target.result);
    reader.onerror = () => reject(reader.error || new Error("read error"));
    reader.readAsText(file);
  });
}

function processText(text, sourceLabel) {
  let rows;
  try { rows = parseCSV(text); }
  catch (e) {
    showError("Failed to parse CSV", `The file at '${sourceLabel}' could not be parsed as CSV.`, String(e && e.message ? e.message : e));
    return;
  }
  const { features, probes } = aggregateFromCSV(rows);
  if (features.length === 0) {
    showError(
      "No feature rows found",
      `Parsed '${sourceLabel}' but it has no detail rows (rows with both source_group and probe_group set).`,
      `Parsed rows: ${rows.length}. Expected the first two rows to be headers, then detail rows like 'bladder,internal,15C,Chameleon,...'.`,
    );
    return;
  }
  renderDashboard({ features, probes, sourceLabel, loadedAt: new Date() });
  showApp();
}

async function tryLoadDefault() {
  showLoading();
  document.getElementById("loader-path").textContent = DEFAULT_CSV_PATH;
  try {
    const text = await loadFromURL(DEFAULT_CSV_PATH);
    processText(text, DEFAULT_CSV_PATH);
  } catch (e) {
    const isFileProto = location.protocol === "file:";
    const msg = `Could not fetch '${DEFAULT_CSV_PATH}'.`;
    const help = isFileProto
      ? `<strong>Tip:</strong> Browsers block local file access from <code class="mono">file://</code> URLs. To auto-load
         the latest CSV, double-click <code class="mono">Open Dashboard.command</code> in Finder. Or drag-and-drop a
         CSV file anywhere on this page right now, or click <em>Choose a CSV file</em> below.`
      : `Drop a CSV file anywhere on this page, or click <em>Choose a CSV file</em> below.`;
    showError("Could not load CSV", msg, String(e && e.message ? e.message : e), help);
  }
}

// ============================================================================
// WIRE UP — file picker, drag & drop, error buttons, init
// ============================================================================
document.getElementById("file-input").addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const text = await loadFromFile(file);
    processText(text, file.name);
  } catch (err) {
    showError("Could not read file", String(err && err.message ? err.message : err));
  } finally {
    e.target.value = ""; // allow picking the same file again
  }
});

document.getElementById("error-pick").onclick  = () => document.getElementById("file-input").click();
document.getElementById("error-retry").onclick = () => tryLoadDefault();

// Drag and drop anywhere on the page
let dragDepth = 0;
window.addEventListener("dragenter", (e) => {
  if (!e.dataTransfer || ![...e.dataTransfer.types].includes("Files")) return;
  e.preventDefault();
  dragDepth++;
  document.body.classList.add("drag-over");
});
window.addEventListener("dragleave", (e) => {
  dragDepth = Math.max(0, dragDepth - 1);
  if (dragDepth === 0) document.body.classList.remove("drag-over");
});
window.addEventListener("dragover", (e) => {
  if (e.dataTransfer && [...e.dataTransfer.types].includes("Files")) {
    e.preventDefault();
    e.dataTransfer.dropEffect = "copy";
  }
});
window.addEventListener("drop", async (e) => {
  e.preventDefault();
  dragDepth = 0;
  document.body.classList.remove("drag-over");
  const file = e.dataTransfer && e.dataTransfer.files[0];
  if (!file) return;
  try {
    const text = await loadFromFile(file);
    processText(text, file.name);
  } catch (err) {
    showError("Could not read dropped file", String(err && err.message ? err.message : err));
  }
});

// Init
tryLoadDefault();
</script>
</body>
</html>
