<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Feature × Probe data collection — pipeline status</title>
<style>
  :root {
    --bg: #0e0f12;
    --bg-elev: #161821;
    --bg-card: #1a1d27;
    --fill-tertiary: #232734;
    --stroke-tertiary: #2c3142;
    --stroke: #3a4055;
    --text-primary: #e6e8ee;
    --text-secondary: #a4abbd;
    --text-tertiary: #6b7388;
    --accent-primary: #4f8cff;
    --accent-info: #4f8cff;
    --accent-success: #2ecc71;
    --accent-warning: #f5b942;
    --accent-danger: #ef4646;
    --accent-neutral: #6b7388;
    --accent-info-soft: rgba(79, 140, 255, 0.12);
    --accent-success-soft: rgba(46, 204, 113, 0.13);
    --accent-warning-soft: rgba(245, 185, 66, 0.13);
    --accent-danger-soft: rgba(239, 70, 70, 0.13);
    --accent-neutral-soft: rgba(107, 115, 136, 0.18);
    --radius: 10px;
  }

  * { box-sizing: border-box; }
  /* The `hidden` HTML attribute must always win, even on elements whose
     author CSS sets a non-default `display` (e.g. .state-card uses flex). */
  [hidden] { display: none !important; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter",
      "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 14px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  code, .mono {
    font-family: "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    font-size: 0.9em;
    background: var(--fill-tertiary);
    padding: 1px 6px;
    border-radius: 4px;
    color: var(--text-primary);
  }
  h1, h2, h3 { margin: 0; font-weight: 600; letter-spacing: -0.01em; }
  h1 { font-size: 28px; line-height: 1.2; }
  h2 { font-size: 20px; line-height: 1.3; }
  h3 { font-size: 16px; line-height: 1.3; }
  p { margin: 0; }
  .secondary { color: var(--text-secondary); }
  .tertiary { color: var(--text-tertiary); font-size: 12px; }
  .small { font-size: 12px; }
  .semibold { font-weight: 600; }

  .container {
    max-width: 1180px;
    margin: 0 auto;
    padding: 32px 24px 64px;
    display: flex; flex-direction: column;
    gap: 28px;
  }

  .meta-row {
    display: flex; justify-content: space-between; align-items: center;
    gap: 12px; flex-wrap: wrap;
  }
  .header-block { display: flex; flex-direction: column; gap: 8px; }

  .grid-4 {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }
  .grid-3 {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }
  .grid-2-1 {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 20px;
  }
  @media (max-width: 900px) {
    .grid-4, .grid-3, .grid-2-1 { grid-template-columns: 1fr; }
  }

  .stat {
    background: var(--bg-card);
    border: 1px solid var(--stroke-tertiary);
    border-radius: var(--radius);
    padding: 16px 18px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .stat .value {
    font-size: 26px; font-weight: 600; letter-spacing: -0.02em;
  }
  .stat .label { color: var(--text-secondary); font-size: 12.5px; }
  .stat.info  .value { color: var(--accent-info); }
  .stat.success .value { color: var(--accent-success); }
  .stat.warning .value { color: var(--accent-warning); }
  .stat.danger  .value { color: var(--accent-danger); }

  .hero {
    display: flex; flex-direction: column; gap: 10px;
    background: var(--bg-card);
    border: 1px solid var(--stroke-tertiary);
    border-radius: var(--radius);
    padding: 18px 20px;
  }
  .hero .top {
    display: flex; justify-content: space-between; align-items: center;
    gap: 12px; flex-wrap: wrap;
  }
  .progress-track {
    position: relative; width: 100%;
    height: 14px; background: var(--fill-tertiary);
    border-radius: 7px; overflow: hidden;
  }
  .progress-fill {
    position: absolute; inset: 0; border-radius: 7px;
  }
  .legend {
    display: flex; gap: 18px; flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .swatch {
    display: inline-block; width: 10px; height: 10px;
    border-radius: 2px;
  }
  .swatch.outline { border: 1px solid var(--stroke-tertiary); }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--stroke-tertiary);
    border-radius: var(--radius);
    overflow: hidden;
    display: flex; flex-direction: column;
  }
  .card-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--stroke-tertiary);
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px;
    font-weight: 600;
    background: rgba(255, 255, 255, 0.015);
  }
  .card-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 8px; }

  .pill {
    display: inline-flex; align-items: center;
    padding: 2px 9px;
    font-size: 11.5px; line-height: 18px;
    border-radius: 999px;
    border: 1px solid transparent;
    background: var(--accent-neutral-soft);
    color: var(--text-primary);
    white-space: nowrap;
  }
  .pill.info    { background: var(--accent-info-soft);    color: #9ec0ff; border-color: rgba(79,140,255,0.3); }
  .pill.success { background: var(--accent-success-soft); color: #6ee5a3; border-color: rgba(46,204,113,0.3); }
  .pill.warning { background: var(--accent-warning-soft); color: #ffd07a; border-color: rgba(245,185,66,0.3); }
  .pill.danger  { background: var(--accent-danger-soft);  color: #ff8c8c; border-color: rgba(239,70,70,0.3); }
  .pill.neutral { background: var(--accent-neutral-soft); color: var(--text-secondary); border-color: rgba(107,115,136,0.3); }

  .pill-row { display: flex; gap: 6px; flex-wrap: wrap; }

  .callout {
    border-radius: var(--radius);
    border: 1px solid;
    padding: 14px 16px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .callout .title { font-weight: 600; }
  .callout.info    { background: var(--accent-info-soft);    border-color: rgba(79,140,255,0.35);   color: var(--text-primary); }
  .callout.success { background: var(--accent-success-soft); border-color: rgba(46,204,113,0.35);  color: var(--text-primary); }
  .callout.warning { background: var(--accent-warning-soft); border-color: rgba(245,185,66,0.35);  color: var(--text-primary); }
  .callout.danger  { background: var(--accent-danger-soft);  border-color: rgba(239,70,70,0.35);   color: var(--text-primary); }

  .table-wrap {
    background: var(--bg-card);
    border: 1px solid var(--stroke-tertiary);
    border-radius: var(--radius);
    overflow: hidden;
  }
  table {
    width: 100%; border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    text-align: left;
    font-weight: 600;
    color: var(--text-secondary);
    font-size: 12px;
    text-transform: uppercase; letter-spacing: 0.04em;
    padding: 12px 14px;
    border-bottom: 1px solid var(--stroke-tertiary);
    background: rgba(255,255,255,0.018);
    white-space: nowrap;
  }
  tbody td {
    padding: 11px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    vertical-align: middle;
  }
  tbody tr:nth-child(odd) td { background: rgba(255,255,255,0.012); }
  tbody tr:last-child td { border-bottom: none; }
  th.right, td.right { text-align: right; }
  th.left,  td.left  { text-align: left; }

  .chart-card {
    background: var(--bg-card);
    border: 1px solid var(--stroke-tertiary);
    border-radius: var(--radius);
    padding: 18px 20px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .chart-svg { width: 100%; display: block; }
  .chart-label { font-size: 12px; fill: var(--text-secondary); }
  .chart-value { font-size: 11px; fill: var(--text-primary); font-weight: 600; }
  .chart-axis { stroke: var(--stroke-tertiary); }

  .divider {
    height: 1px; width: 100%;
    background: var(--stroke-tertiary);
    border: none;
  }
  /* #app holds all the sections injected by renderDashboard. Without its
     own flex+gap, the container's `gap: 28px` only applies between #loader,
     #error and #app — not between the sections inside #app, which would
     stack with no breathing room. */
  #app { display: flex; flex-direction: column; gap: 28px; }
  .section { display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .row.between { justify-content: space-between; }
  .stack { display: flex; flex-direction: column; gap: 6px; }

  /* === Buttons & toolbar === */
  .btn {
    cursor: pointer;
    background: var(--bg-card);
    color: var(--text-primary);
    border: 1px solid var(--stroke-tertiary);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 12.5px; font-weight: 500;
    font-family: inherit;
  }
  .btn:hover { border-color: var(--accent-primary); color: var(--accent-primary); }
  .btn.primary {
    background: var(--accent-primary);
    color: white;
    border-color: var(--accent-primary);
  }
  .btn.primary:hover { background: #6ea1ff; color: white; }

  .toolbar {
    display: flex; justify-content: space-between; align-items: center;
    gap: 16px; flex-wrap: wrap;
    background: var(--bg-card);
    border: 1px solid var(--stroke-tertiary);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 12.5px;
  }
  .toolbar-info { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; color: var(--text-secondary); }
  .toolbar-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  /* === Loader / error states === */
  .state-card {
    background: var(--bg-card);
    border: 1px solid var(--stroke-tertiary);
    border-radius: var(--radius);
    padding: 28px 32px;
    display: flex; flex-direction: column; gap: 14px;
    margin: 80px auto 0;
    max-width: 720px;
  }
  .state-card h2 { font-size: 18px; }
  .state-card.error { border-color: rgba(239,70,70,0.35); background: rgba(239,70,70,0.06); }
  .state-card .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
  .state-card pre {
    margin: 0; padding: 10px 12px;
    background: var(--bg);
    border: 1px solid var(--stroke-tertiary);
    border-radius: 6px;
    font-size: 12px;
    color: var(--text-secondary);
    overflow-x: auto;
    white-space: pre-wrap; word-break: break-word;
  }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--stroke-tertiary);
    border-top-color: var(--accent-primary);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
    vertical-align: -4px; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* === Predictor === */
  .predictor {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 16px;
  }
  @media (max-width: 900px) {
    .predictor { grid-template-columns: 1fr; }
  }
  .predictor-controls {
    background: var(--bg-card);
    border: 1px solid var(--stroke-tertiary);
    border-radius: var(--radius);
    padding: 16px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .predictor-output {
    background: var(--bg-card);
    border: 1px solid var(--stroke-tertiary);
    border-radius: var(--radius);
    padding: 16px 18px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label {
    font-size: 11.5px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-weight: 600;
  }
  .field .hint { font-size: 11px; color: var(--text-tertiary); }
  .input, .select {
    background: var(--bg-elev);
    color: var(--text-primary);
    border: 1px solid var(--stroke-tertiary);
    border-radius: 6px;
    padding: 7px 10px;
    font-size: 13px;
    font-family: inherit;
    width: 100%;
  }
  .input:focus, .select:focus {
    outline: none;
    border-color: var(--accent-primary);
  }
  .input[type="number"] { font-variant-numeric: tabular-nums; }
  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .mode-toggle {
    display: flex;
    border: 1px solid var(--stroke-tertiary);
    border-radius: 6px;
    overflow: hidden;
  }
  .mode-toggle button {
    flex: 1;
    background: var(--bg-elev);
    color: var(--text-secondary);
    border: none;
    padding: 7px 10px;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    border-right: 1px solid var(--stroke-tertiary);
  }
  .mode-toggle button:last-child { border-right: none; }
  .mode-toggle button.active {
    background: var(--accent-info-soft);
    color: #9ec0ff;
  }
  .pred-stat-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 10px;
  }
  .rate-row {
    display: flex;
    gap: 8px;
    align-items: stretch;
  }
  .rate-row .input { flex: 1; min-width: 0; }
  .rate-row .mode-toggle { flex: 0 0 auto; }
  .rate-row .mode-toggle button { padding: 0 10px; font-size: 11.5px; }
  .pred-stat {
    background: var(--bg-elev);
    border: 1px solid var(--stroke-tertiary);
    border-radius: 8px;
    padding: 10px 12px;
    display: flex; flex-direction: column; gap: 2px;
    min-width: 0;
  }
  .pred-stat .v {
    font-size: 22px; font-weight: 600; letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
    line-height: 1.15;
  }
  .pred-stat .v.compact { font-size: 16px; }
  .pred-stat .v .unit {
    font-size: 12px; font-weight: 500;
    color: var(--text-secondary);
    margin-left: 3px;
    letter-spacing: 0;
  }
  .pred-stat .v .sep {
    color: var(--text-tertiary);
    margin: 0 6px;
    font-weight: 400;
  }
  .pred-stat .l { font-size: 11px; color: var(--text-secondary); }
  .pred-stat.success .v { color: var(--accent-success); }
  .pred-stat.warning .v { color: var(--accent-warning); }
  .pred-stat.danger  .v { color: var(--accent-danger); }
  .pred-stat.info    .v { color: var(--accent-info); }
  .pred-warn {
    font-size: 12px;
    color: var(--accent-warning);
    background: var(--accent-warning-soft);
    border: 1px solid rgba(245,185,66,0.3);
    border-radius: 6px;
    padding: 8px 10px;
  }

  /* === Whole-pipeline scope === */
  .scope-toggle { margin-bottom: 4px; max-width: 320px; }
  .phase-grid {
    display: flex; flex-direction: column; gap: 8px;
  }
  .phase-row {
    display: grid;
    grid-template-columns: 110px 1fr 70px 130px;
    gap: 8px;
    align-items: end;
    padding: 8px;
    background: var(--bg-elev);
    border: 1px solid var(--stroke-tertiary);
    border-radius: 6px;
  }
  .phase-row .phase-label {
    font-size: 11.5px; font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .phase-row .phase-rate { display: flex; gap: 4px; align-items: stretch; }
  .phase-row .phase-rate .input { flex: 1; min-width: 0; padding: 5px 7px; font-size: 12px; }
  .phase-row .phase-rate .mode-toggle button { padding: 0 6px; font-size: 10.5px; }
  .phase-row input.input { padding: 5px 7px; font-size: 12px; }
  .phase-row input.input:disabled {
    opacity: 0.55; cursor: not-allowed;
    background: var(--fill-tertiary);
  }
  .phase-row .start-cell {
    display: flex; flex-direction: column; gap: 2px;
  }
  .phase-row .start-cell .start-row {
    display: flex; gap: 4px; align-items: center;
  }
  .phase-row .start-cell .start-row .input { flex: 1; }
  .phase-row .start-cell .override-toggle {
    cursor: pointer; user-select: none;
    font-size: 10px; color: var(--text-tertiary);
    display: flex; align-items: center; gap: 3px;
  }
  .phase-row .start-cell .override-toggle input { margin: 0; }
  .pass-rates {
    display: flex; flex-wrap: wrap; gap: 6px;
    font-size: 11px; color: var(--text-secondary);
  }
  .phase-card-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 10px;
  }
  .phase-card {
    background: var(--bg-elev);
    border: 1px solid var(--stroke-tertiary);
    border-radius: 8px;
    padding: 10px 12px;
    display: flex; flex-direction: column; gap: 4px;
    border-left: 3px solid var(--accent-info);
  }
  .phase-card.t-info    { border-left-color: var(--accent-info); }
  .phase-card.t-success { border-left-color: var(--accent-success); }
  .phase-card.t-warning { border-left-color: var(--accent-warning); }
  .phase-card.t-violet  { border-left-color: #8a6dff; }
  .phase-card.t-neutral { border-left-color: var(--accent-neutral); }
  .phase-card .pc-title {
    font-size: 11.5px; font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .phase-card .pc-dates {
    font-size: 13px; font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .phase-card .pc-meta {
    font-size: 11px; color: var(--text-secondary);
    font-variant-numeric: tabular-nums;
  }
  .phase-card .pc-pill {
    display: inline-flex; align-self: flex-start;
    padding: 1px 7px;
    font-size: 10.5px; line-height: 16px;
    border-radius: 999px;
    background: var(--accent-warning-soft);
    color: #ffd07a;
    border: 1px solid rgba(245,185,66,0.3);
    margin-top: 2px;
  }
  .gantt-card {
    background: var(--bg-card);
    border: 1px solid var(--stroke-tertiary);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex; flex-direction: column; gap: 12px;
  }

  /* === Drag-and-drop overlay === */
  body.drag-over::after {
    content: "Drop the CSV file to load it";
    position: fixed; inset: 0;
    background: rgba(79,140,255,0.18);
    border: 3px dashed var(--accent-primary);
    color: var(--text-primary);
    font-size: 22px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    z-index: 1000;
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="container">
  <div id="loader" class="state-card">
    <div><span class="spinner"></span><span class="semibold">Loading dashboard...</span></div>
    <div class="secondary small">Reading <code class="mono" id="loader-path">data/dashboard_feature_probe_source.csv</code></div>
  </div>

  <div id="error" class="state-card error" hidden>
    <h2 id="error-title">Could not load CSV</h2>
    <div class="secondary" id="error-msg"></div>
    <pre id="error-detail" hidden></pre>
    <div class="secondary small" id="error-help"></div>
    <div class="actions">
      <button class="btn primary" id="error-pick">Choose a CSV file...</button>
      <button class="btn" id="error-retry">Retry default location</button>
    </div>
  </div>

  <div id="app" hidden></div>
</div>

<input type="file" id="file-input" accept=".csv,text/csv" hidden />

<script>
// ============================================================================
// CONSTANTS
// ============================================================================
const DEFAULT_CSV_PATH = 'data/dashboard_feature_probe_source.csv';

// CSV column indices — must match scripts/regenerate_canvas.py historically.
const COL_FEATURE              = 0;
const COL_SOURCE               = 1;
const COL_PROBE                = 2;
const COL_REQUIRED             = 4;
const COL_COLLECTED            = 5;
const COL_PENDING_MULTIFRAME   = 7;
const COL_PENDING_CURATION     = 9;
const COL_PASS_CURATION        = 10;
const COL_FAIL_CURATION        = 11;
const COL_PENDING_ANNOTATIONS  = 13;
const COL_COMPLETE_ANNOTATIONS = 14;
const COL_PENDING_REVIEW       = 15;
const COL_FRAMES_PASS_REVIEW   = 16;
const COL_FRAMES_FAIL_REVIEW   = 17;

// ============================================================================
// CSV PARSER — RFC 4180-ish, handles quoted fields with embedded commas,
// double-quote escaping ("") and CRLF / LF / CR line endings.
// ============================================================================
function parseCSV(text) {
  // Strip UTF-8 BOM if present.
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);

  const rows = [];
  let row = [];
  let cell = '';
  let inQuotes = false;
  let i = 0;
  const n = text.length;

  while (i < n) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') {
        if (text[i + 1] === '"') { cell += '"'; i += 2; continue; }
        inQuotes = false; i++; continue;
      }
      cell += c; i++; continue;
    }
    if (c === '"') { inQuotes = true; i++; continue; }
    if (c === ',') { row.push(cell); cell = ''; i++; continue; }
    if (c === '\r' || c === '\n') {
      row.push(cell); rows.push(row);
      cell = ''; row = [];
      if (c === '\r' && text[i + 1] === '\n') i += 2; else i++;
      continue;
    }
    cell += c; i++;
  }
  if (cell !== '' || row.length > 0) { row.push(cell); rows.push(row); }
  return rows;
}

// ============================================================================
// AGGREGATOR — port of parse_csv() from scripts/regenerate_canvas.py
// ============================================================================
function toInt(v) {
  if (v == null) return 0;
  const s = String(v).trim();
  if (!s) return 0;
  const n = parseFloat(s);
  return Number.isFinite(n) ? Math.trunc(n) : 0;
}
function cell(row, idx) { return idx < row.length ? row[idx] : ''; }

function aggregateFromCSV(rows) {
  const features = new Map();
  const featureOrder = [];
  const probes = [];
  const seenProbes = new Set();

  // First two rows are the grouped + column-name headers.
  for (let r = 2; r < rows.length; r++) {
    const row = rows[r];
    const feature = String(cell(row, COL_FEATURE)).trim();
    const source  = String(cell(row, COL_SOURCE)).trim();
    const probe   = String(cell(row, COL_PROBE)).trim();
    if (!feature) continue;
    // Subtotal rows leave source/probe empty — same filter as the Python.
    if (!source || !probe) continue;

    let agg = features.get(feature);
    if (!agg) {
      agg = {
        name: feature,
        required: 0, collected: 0, pendingMultiframe: 0,
        pendingCuration: 0, passCuration: 0, failCuration: 0,
        pendingAnnotations: 0, completeAnnotations: 0,
        pendingReview: 0, framesPassReview: 0, framesFailReview: 0,
        sources: new Set(),
      };
      features.set(feature, agg);
      featureOrder.push(feature);
    }
    agg.required             += toInt(cell(row, COL_REQUIRED));
    agg.collected            += toInt(cell(row, COL_COLLECTED));
    agg.pendingMultiframe    += toInt(cell(row, COL_PENDING_MULTIFRAME));
    agg.pendingCuration      += toInt(cell(row, COL_PENDING_CURATION));
    agg.passCuration         += toInt(cell(row, COL_PASS_CURATION));
    agg.failCuration         += toInt(cell(row, COL_FAIL_CURATION));
    agg.pendingAnnotations   += toInt(cell(row, COL_PENDING_ANNOTATIONS));
    agg.completeAnnotations  += toInt(cell(row, COL_COMPLETE_ANNOTATIONS));
    agg.pendingReview        += toInt(cell(row, COL_PENDING_REVIEW));
    agg.framesPassReview     += toInt(cell(row, COL_FRAMES_PASS_REVIEW));
    agg.framesFailReview     += toInt(cell(row, COL_FRAMES_FAIL_REVIEW));
    agg.sources.add(source);

    if (!seenProbes.has(probe)) { seenProbes.add(probe); probes.push(probe); }
  }

  const featureList = featureOrder.map((name) => {
    const agg = features.get(name);
    const hasInternal = agg.sources.has('internal');
    const hasExternal = agg.sources.has('external');
    let sourceCoverage = 'internal-only';
    if (hasInternal && hasExternal) sourceCoverage = 'both';
    else if (hasExternal && !hasInternal) sourceCoverage = 'external-only';
    return { ...agg, sourceCoverage };
  });
  // Match Python: sort by -collected, -required, name asc
  featureList.sort((a, b) => {
    if (b.collected !== a.collected) return b.collected - a.collected;
    if (b.required  !== a.required)  return b.required  - a.required;
    return a.name.localeCompare(b.name);
  });

  return { features: featureList, probes };
}

// ============================================================================
// HELPERS
// ============================================================================
const sum = (arr, key) => arr.reduce((s, x) => s + x[key], 0);
const pctOf = (part, whole) => whole === 0 ? 0 : Math.round((part / whole) * 100);

function escapeXml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&apos;",
  }[c]));
}

function el(tag, attrs = {}, ...children) {
  const node = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === "class") node.className = v;
    else if (k === "html") node.innerHTML = v;
    else if (k === "style") node.setAttribute("style", v);
    else if (k === "hidden") { if (v) node.setAttribute("hidden", ""); }
    else node.setAttribute(k, v);
  }
  for (const c of children) {
    if (c == null) continue;
    if (typeof c === "string") node.appendChild(document.createTextNode(c));
    else node.appendChild(c);
  }
  return node;
}

function pillHTML(text, tone = "neutral") {
  return `<span class="pill ${tone}">${escapeXml(text)}</span>`;
}
function statCard(value, label, tone = "") {
  return el("div", { class: `stat ${tone}` },
    el("div", { class: "value" }, value),
    el("div", { class: "label" }, label),
  );
}
function callout(tone, title, bodyHTML) {
  const c = el("div", { class: `callout ${tone}` });
  c.appendChild(el("div", { class: "title" }, title));
  c.appendChild(el("div", { class: "secondary small", html: bodyHTML }));
  return c;
}
function statusFor(f) {
  if (f.collected === 0) return { label: "Not started", tone: "danger" };
  const pct = pctOf(f.collected, f.required);
  if (pct >= 80) return { label: "On track", tone: "success" };
  if (pct >= 40) return { label: "In progress", tone: "warning" };
  return { label: "Lagging", tone: "danger" };
}
function sourcePill(coverage) {
  if (coverage === "internal-only") return pillHTML("internal", "info");
  if (coverage === "external-only") return pillHTML("external", "warning");
  return pillHTML("internal + external", "neutral");
}

// ============================================================================
// CHARTS
// ============================================================================
const CHART_COLORS = {
  success: "#2ecc71",
  warning: "#f5b942",
  danger:  "#ef4646",
  info:    "#4f8cff",
  neutral: "#3a4055",
  violet:  "#8a6dff",
};

function horizontalBarChart(categories, series, opts = {}) {
  const stacked    = opts.stacked ?? false;
  const rowHeight  = 26;
  const rowGap     = 8;
  const padTop     = 28;
  const padBottom  = 28;
  const padLeft    = 130;
  const padRight   = 60;
  const innerWidth = 760;
  const totalWidth = innerWidth + padLeft + padRight;
  const totalHeight = padTop + padBottom + categories.length * (rowHeight + rowGap) - rowGap;

  let scaleMax = 0;
  for (let i = 0; i < categories.length; i++) {
    let rowSum = 0;
    for (const s of series) {
      if (stacked) rowSum += s.data[i];
      else rowSum = Math.max(rowSum, s.data[i]);
    }
    scaleMax = Math.max(scaleMax, rowSum);
  }
  if (scaleMax === 0) scaleMax = 1;
  function niceCeil(n) {
    if (n <= 10) return Math.ceil(n);
    const pow = Math.pow(10, Math.floor(Math.log10(n)));
    return Math.ceil(n / pow) * pow;
  }
  const axisMax = niceCeil(scaleMax);
  const xToPx = (v) => padLeft + (v / axisMax) * innerWidth;

  const ticks = 4;
  const tickValues = [];
  for (let t = 0; t <= ticks; t++) tickValues.push(Math.round(axisMax * t / ticks));

  let svg = `<svg viewBox="0 0 ${totalWidth} ${totalHeight}" class="chart-svg" preserveAspectRatio="xMidYMid meet">`;
  for (const t of tickValues) {
    const x = xToPx(t);
    svg += `<line x1="${x}" y1="${padTop - 6}" x2="${x}" y2="${totalHeight - padBottom + 6}" stroke="var(--stroke-tertiary)" stroke-dasharray="2 3" stroke-width="1"/>`;
    svg += `<text x="${x}" y="${padTop - 10}" text-anchor="middle" class="chart-label">${t}</text>`;
  }
  for (let i = 0; i < categories.length; i++) {
    const rowY = padTop + i * (rowHeight + rowGap);
    svg += `<text x="${padLeft - 10}" y="${rowY + rowHeight / 2 + 4}" text-anchor="end" class="chart-label">${escapeXml(categories[i])}</text>`;
    if (stacked) {
      let cursorX = padLeft;
      let totalRow = 0;
      for (const s of series) {
        const w = (s.data[i] / axisMax) * innerWidth;
        if (w > 0) {
          svg += `<rect x="${cursorX}" y="${rowY}" width="${w}" height="${rowHeight}" fill="${CHART_COLORS[s.tone] || CHART_COLORS.info}" rx="3"/>`;
          if (s.data[i] > 0 && w > 22) {
            svg += `<text x="${cursorX + w / 2}" y="${rowY + rowHeight / 2 + 4}" text-anchor="middle" class="chart-value">${s.data[i]}</text>`;
          }
        }
        cursorX += w;
        totalRow += s.data[i];
      }
      svg += `<text x="${cursorX + 6}" y="${rowY + rowHeight / 2 + 4}" text-anchor="start" class="chart-label">${totalRow}</text>`;
    } else {
      const v = series[0].data[i];
      const w = (v / axisMax) * innerWidth;
      svg += `<rect x="${padLeft}" y="${rowY}" width="${w}" height="${rowHeight}" fill="${CHART_COLORS[series[0].tone] || CHART_COLORS.info}" rx="3"/>`;
      svg += `<text x="${padLeft + w + 6}" y="${rowY + rowHeight / 2 + 4}" text-anchor="start" class="chart-value">${v}</text>`;
    }
  }
  svg += `<line x1="${padLeft}" y1="${totalHeight - padBottom + 4}" x2="${padLeft + innerWidth}" y2="${totalHeight - padBottom + 4}" stroke="var(--stroke-tertiary)" stroke-width="1"/>`;
  svg += `</svg>`;

  let legend = "";
  if (series.length > 1 || stacked) {
    legend = `<div class="legend">`;
    for (const s of series) {
      legend += `<div class="legend-item"><span class="swatch" style="background:${CHART_COLORS[s.tone] || CHART_COLORS.info}"></span><span class="small secondary">${escapeXml(s.name)}</span></div>`;
    }
    legend += `</div>`;
  }
  return svg + legend;
}

function donutChart(data) {
  const size  = 220;
  const cx    = size / 2;
  const cy    = size / 2;
  const r     = 80;
  const inner = 50;
  const total = data.reduce((s, d) => s + d.value, 0) || 1;

  let angle = -Math.PI / 2;
  let svg = `<svg viewBox="0 0 ${size} ${size}" class="chart-svg" style="max-width: 240px; margin: 0 auto;">`;
  for (const slice of data) {
    if (slice.value <= 0) continue;
    const frac = slice.value / total;
    const next = angle + frac * Math.PI * 2;
    const x1 = cx + r * Math.cos(angle), y1 = cy + r * Math.sin(angle);
    const x2 = cx + r * Math.cos(next),  y2 = cy + r * Math.sin(next);
    const x3 = cx + inner * Math.cos(next),  y3 = cy + inner * Math.sin(next);
    const x4 = cx + inner * Math.cos(angle), y4 = cy + inner * Math.sin(angle);
    const large = (next - angle) > Math.PI ? 1 : 0;
    const path = `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} L ${x3} ${y3} A ${inner} ${inner} 0 ${large} 0 ${x4} ${y4} Z`;
    const color = CHART_COLORS[slice.tone] || CHART_COLORS.info;
    svg += `<path d="${path}" fill="${color}" stroke="var(--bg-card)" stroke-width="2"/>`;
    angle = next;
  }
  svg += `<text x="${cx}" y="${cy - 4}" text-anchor="middle" font-size="22" font-weight="600" fill="var(--text-primary)">${total}</text>`;
  svg += `<text x="${cx}" y="${cy + 14}" text-anchor="middle" font-size="11" fill="var(--text-secondary)">total</text>`;
  svg += `</svg>`;

  let legend = `<div class="legend" style="justify-content:center; margin-top:8px">`;
  for (const slice of data) {
    const pct = Math.round(slice.value / total * 100);
    legend += `<div class="legend-item">
      <span class="swatch" style="background:${CHART_COLORS[slice.tone] || CHART_COLORS.info}"></span>
      <span class="small secondary">${escapeXml(slice.label)}: <span style="color:var(--text-primary); font-weight:600">${slice.value}</span> (${pct}%)</span>
    </div>`;
  }
  legend += `</div>`;
  return svg + legend;
}

// lineChart — draws one or more series over a shared time axis.
// series: [{ name, tone, points: [{x: Date, y: number}], dashed?: bool }]
// opts:   { yLabel, xLabel, height, target?: number }
function lineChart(series, opts = {}) {
  const padTop    = 24;
  const padBottom = 40;
  const padLeft   = 56;
  const padRight  = 18;
  const innerW    = 720;
  const innerH    = opts.height ?? 220;
  const totalW    = innerW + padLeft + padRight;
  const totalH    = innerH + padTop + padBottom;

  let xMin = Infinity, xMax = -Infinity, yMax = 0;
  for (const s of series) {
    for (const p of s.points) {
      const t = p.x.getTime();
      if (t < xMin) xMin = t;
      if (t > xMax) xMax = t;
      if (p.y > yMax) yMax = p.y;
    }
  }
  if (opts.target != null && opts.target > yMax) yMax = opts.target;
  if (!Number.isFinite(xMin) || xMin === xMax) { xMax = xMin + 24 * 3600 * 1000; }
  if (yMax <= 0) yMax = 1;

  function niceCeil(n) {
    if (n <= 10) return Math.ceil(n);
    const pow = Math.pow(10, Math.floor(Math.log10(n)));
    const step = pow / 2;
    return Math.ceil(n / step) * step;
  }
  const yAxisMax = niceCeil(yMax);

  const xToPx = (t) => padLeft + ((t - xMin) / (xMax - xMin)) * innerW;
  const yToPx = (v) => padTop + innerH - (v / yAxisMax) * innerH;

  let svg = `<svg viewBox="0 0 ${totalW} ${totalH}" class="chart-svg" preserveAspectRatio="xMidYMid meet">`;

  const yTicks = 4;
  for (let i = 0; i <= yTicks; i++) {
    const v = (yAxisMax * i) / yTicks;
    const y = yToPx(v);
    svg += `<line x1="${padLeft}" y1="${y}" x2="${padLeft + innerW}" y2="${y}" stroke="var(--stroke-tertiary)" stroke-dasharray="2 3" stroke-width="1"/>`;
    svg += `<text x="${padLeft - 8}" y="${y + 4}" text-anchor="end" class="chart-label">${Math.round(v)}</text>`;
  }

  const xTickCount = Math.min(6, Math.max(2, Math.round(innerW / 120)));
  for (let i = 0; i <= xTickCount; i++) {
    const t = xMin + ((xMax - xMin) * i) / xTickCount;
    const x = xToPx(t);
    const d = new Date(t);
    const lbl = `${d.toLocaleDateString(undefined, { month: "short", day: "2-digit" })}`;
    svg += `<line x1="${x}" y1="${padTop + innerH}" x2="${x}" y2="${padTop + innerH + 4}" stroke="var(--stroke-tertiary)"/>`;
    svg += `<text x="${x}" y="${padTop + innerH + 18}" text-anchor="middle" class="chart-label">${lbl}</text>`;
  }

  if (opts.target != null) {
    const y = yToPx(opts.target);
    svg += `<line x1="${padLeft}" y1="${y}" x2="${padLeft + innerW}" y2="${y}" stroke="${CHART_COLORS.warning}" stroke-dasharray="4 3" stroke-width="1.5"/>`;
    svg += `<text x="${padLeft + innerW - 4}" y="${y - 4}" text-anchor="end" class="chart-label" style="fill:${CHART_COLORS.warning}">Target ${opts.target}</text>`;
  }

  for (const s of series) {
    if (!s.points.length) continue;
    const color = CHART_COLORS[s.tone] || CHART_COLORS.info;
    let d = "";
    s.points.forEach((p, idx) => {
      const x = xToPx(p.x.getTime());
      const y = yToPx(p.y);
      d += (idx === 0 ? "M" : "L") + ` ${x.toFixed(2)} ${y.toFixed(2)} `;
    });
    const dashAttr = s.dashed ? `stroke-dasharray="5 4"` : "";
    svg += `<path d="${d}" fill="none" stroke="${color}" stroke-width="2" ${dashAttr}/>`;
    const last = s.points[s.points.length - 1];
    svg += `<circle cx="${xToPx(last.x.getTime())}" cy="${yToPx(last.y)}" r="3.5" fill="${color}"/>`;
  }

  if (opts.yLabel) {
    svg += `<text x="14" y="${padTop + innerH / 2}" text-anchor="middle" transform="rotate(-90 14 ${padTop + innerH / 2})" class="chart-label">${escapeXml(opts.yLabel)}</text>`;
  }
  svg += `<line x1="${padLeft}" y1="${padTop}" x2="${padLeft}" y2="${padTop + innerH}" stroke="var(--stroke-tertiary)"/>`;
  svg += `<line x1="${padLeft}" y1="${padTop + innerH}" x2="${padLeft + innerW}" y2="${padTop + innerH}" stroke="var(--stroke-tertiary)"/>`;
  svg += `</svg>`;

  let legend = `<div class="legend">`;
  for (const s of series) {
    legend += `<div class="legend-item">
      <span class="swatch" style="background:${CHART_COLORS[s.tone] || CHART_COLORS.info}; ${s.dashed ? "outline: 1px dashed var(--stroke);" : ""}"></span>
      <span class="small secondary">${escapeXml(s.name)}</span>
    </div>`;
  }
  legend += `</div>`;
  return svg + legend;
}

// ganttBarsSVG — horizontal Gantt bar per phase across a calendar-day axis.
// phases: [{ id, label, tone, start: Date|null, end: Date|null,
//            startOverride?: Date|null, target, done }]
// opts:   { startDate: Date, endDate: Date, todayMarker?: Date, height?: number }
function ganttBarsSVG(phases, opts = {}) {
  const padTop    = 24;
  const padBottom = 28;
  const padLeft   = 130;
  const padRight  = 24;
  const innerW    = 720;
  const rowHeight = 22;
  const rowGap    = 10;
  const innerH    = phases.length * (rowHeight + rowGap) - rowGap;
  const totalW    = innerW + padLeft + padRight;
  const totalH    = innerH + padTop + padBottom;

  const xMin = opts.startDate.getTime();
  let xMax = opts.endDate ? opts.endDate.getTime() : xMin + 30 * 24 * 3600 * 1000;
  if (xMax <= xMin) xMax = xMin + 24 * 3600 * 1000;

  const xToPx = (t) => padLeft + ((t - xMin) / (xMax - xMin)) * innerW;

  let svg = `<svg viewBox="0 0 ${totalW} ${totalH}" class="chart-svg" preserveAspectRatio="xMidYMid meet">`;

  // X-axis date ticks.
  const tickCount = Math.min(7, Math.max(2, Math.round(innerW / 110)));
  for (let i = 0; i <= tickCount; i++) {
    const t = xMin + ((xMax - xMin) * i) / tickCount;
    const x = xToPx(t);
    svg += `<line x1="${x}" y1="${padTop - 4}" x2="${x}" y2="${padTop + innerH + 4}" stroke="var(--stroke-tertiary)" stroke-dasharray="2 3" stroke-width="1"/>`;
    const lbl = new Date(t).toLocaleDateString(undefined, { month: "short", day: "2-digit" });
    svg += `<text x="${x}" y="${padTop + innerH + 18}" text-anchor="middle" class="chart-label">${lbl}</text>`;
  }

  // Today marker.
  if (opts.todayMarker) {
    const t = opts.todayMarker.getTime();
    if (t >= xMin && t <= xMax) {
      const x = xToPx(t);
      svg += `<line x1="${x}" y1="${padTop - 4}" x2="${x}" y2="${padTop + innerH + 4}" stroke="${CHART_COLORS.danger}" stroke-width="1.5" stroke-dasharray="3 3"/>`;
      svg += `<text x="${x + 4}" y="${padTop + 8}" class="chart-label" style="fill:${CHART_COLORS.danger}">today</text>`;
    }
  }

  // Bars.
  for (let i = 0; i < phases.length; i++) {
    const p = phases[i];
    const rowY = padTop + i * (rowHeight + rowGap);
    const color = CHART_COLORS[p.tone] || CHART_COLORS.info;

    // Phase label.
    svg += `<text x="${padLeft - 10}" y="${rowY + rowHeight / 2 + 4}" text-anchor="end" class="chart-label">${escapeXml(p.label)}</text>`;

    // Lane background.
    svg += `<rect x="${padLeft}" y="${rowY}" width="${innerW}" height="${rowHeight}" fill="var(--fill-tertiary)" rx="4" opacity="0.4"/>`;

    if (p.start && p.end) {
      const x1 = xToPx(Math.max(xMin, p.start.getTime()));
      const x2 = xToPx(Math.min(xMax, p.end.getTime()));
      const w = Math.max(2, x2 - x1);
      svg += `<rect x="${x1}" y="${rowY}" width="${w}" height="${rowHeight}" fill="${color}" rx="4"/>`;
      // Inline label inside the bar when there's room.
      if (w > 60) {
        const days = Math.max(1, Math.round((p.end.getTime() - p.start.getTime()) / (24 * 3600 * 1000)));
        svg += `<text x="${x1 + 8}" y="${rowY + rowHeight / 2 + 4}" class="chart-value" style="fill:#fff">${days}d</text>`;
      }
      // Override marker triangle at the start, when this phase had a manual override.
      if (p.startOverride) {
        const ox = xToPx(p.startOverride.getTime());
        svg += `<polygon points="${ox - 5},${rowY - 6} ${ox + 5},${rowY - 6} ${ox},${rowY - 1}" fill="${CHART_COLORS.warning}"/>`;
      }
    } else if (p.startOverride) {
      // Override set, but the phase didn't run within the simulation window.
      const ox = xToPx(p.startOverride.getTime());
      svg += `<polygon points="${ox - 5},${rowY - 6} ${ox + 5},${rowY - 6} ${ox},${rowY - 1}" fill="${CHART_COLORS.warning}"/>`;
    }
  }

  // Bottom axis line.
  svg += `<line x1="${padLeft}" y1="${padTop + innerH + 4}" x2="${padLeft + innerW}" y2="${padTop + innerH + 4}" stroke="var(--stroke-tertiary)"/>`;
  svg += `</svg>`;

  let legend = `<div class="legend">`;
  for (const p of phases) {
    legend += `<div class="legend-item">
      <span class="swatch" style="background:${CHART_COLORS[p.tone] || CHART_COLORS.info}"></span>
      <span class="small secondary">${escapeXml(p.label)}</span>
    </div>`;
  }
  legend += `</div>`;
  return svg + legend;
}
